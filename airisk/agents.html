<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#fff;--surface:#F9FAFB;--text:#111827;--text2:#6B7280;--primary:#2563EB;--border:#E5E7EB;--red:#EF4444;--amber:#F59E0B;--green:#10B981;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.06)}
    html{font-size:16px;scroll-behavior:smooth}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:var(--primary);text-decoration:none}

    .nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:.4rem;color:var(--text)}
    .nav-brand:hover{text-decoration:none}
    .nav-actions{display:flex;gap:0}
    .nav-actions a{color:var(--text2);font-size:.8rem;font-weight:500;padding:.4rem .6rem;border-radius:5px;white-space:nowrap}
    .nav-actions a:hover,.nav-actions a.active{color:var(--primary);background:#EFF6FF;text-decoration:none}

    .container{max-width:1200px;margin:0 auto;padding:2rem}

    /* Hero */
    .agents-hero{text-align:center;padding:3rem 2rem;background:linear-gradient(160deg,#0F172A,#1E293B,#334155);color:#fff;position:relative;overflow:hidden}
    .agents-hero::before{content:'';position:absolute;top:-50%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(37,99,235,.1) 0%,transparent 60%);pointer-events:none}
    .agents-hero h1{font-size:2rem;font-weight:900;opacity:0;animation:fu .6s ease forwards .2s}
    .agents-hero p{color:rgba(255,255,255,.6);font-size:.9rem;margin-top:.5rem;opacity:0;animation:fu .6s ease forwards .4s}
    @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* Filter tabs */
    .filter-bar{display:flex;gap:.3rem;flex-wrap:wrap;margin:1.5rem 0;padding:.5rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
    .filter-btn{padding:.4rem .8rem;font-size:.78rem;font-weight:600;border:none;background:transparent;border-radius:5px;cursor:pointer;color:var(--text2);transition:all .2s}
    .filter-btn:hover{background:#EFF6FF;color:var(--primary)}
    .filter-btn.active{background:var(--primary);color:#fff}

    /* Stats bar */
    .agent-stats{display:flex;gap:1.5rem;justify-content:center;margin:1.5rem 0;flex-wrap:wrap}
    .agent-stat{text-align:center}
    .agent-stat .num{font-size:1.8rem;font-weight:900;font-family:'JetBrains Mono',monospace}
    .agent-stat .label{font-size:.7rem;color:var(--text2)}

    /* Impact meter - programmatic */
    .impact-section{background:linear-gradient(135deg,#1E293B,#0F172A);color:#fff;border-radius:var(--radius);padding:2rem;margin:2rem 0}
    .impact-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem}
    .impact-bars{display:flex;flex-direction:column;gap:.5rem}
    .impact-row{display:flex;align-items:center;gap:.75rem}
    .impact-cat{font-size:.78rem;min-width:120px;color:rgba(255,255,255,.7)}
    .impact-bar{flex:1;height:24px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;position:relative}
    .impact-bar-fill{height:100%;border-radius:4px;transition:width 1.5s ease;display:flex;align-items:center;padding-left:.5rem}
    .impact-bar-text{font-size:.68rem;font-weight:600;color:#fff;white-space:nowrap}
    .impact-val{font-size:.78rem;font-weight:700;min-width:40px;text-align:right;font-family:'JetBrains Mono',monospace}

    /* Agent cards */
    .agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:.75rem;margin:1.5rem 0}
    .agent-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer}
    .agent-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .agent-card-header{padding:1rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border)}
    .agent-cat-badge{font-size:.65rem;font-weight:600;padding:.15rem .4rem;border-radius:3px;color:#fff;white-space:nowrap}
    .agent-name{font-size:.95rem;font-weight:700;flex:1}
    .agent-company{font-size:.72rem;color:var(--text2)}
    .agent-card-body{padding:1rem}
    .agent-desc{font-size:.8rem;color:var(--text2);line-height:1.6;margin-bottom:.75rem}
    .agent-replaces{margin-top:.5rem}
    .agent-replaces-title{font-size:.7rem;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.02em;margin-bottom:.3rem}
    .agent-job-tags{display:flex;flex-wrap:wrap;gap:.2rem}
    .agent-job-tag{font-size:.68rem;padding:.12rem .35rem;border:1px solid #FECACA;background:#FEF2F2;border-radius:3px;color:#991B1B;cursor:pointer;transition:background .15s}
    .agent-job-tag:hover{background:#FEE2E2}
    .threat-meter{display:flex;align-items:center;gap:.5rem;margin-top:.75rem}
    .threat-label{font-size:.7rem;color:var(--text2)}
    .threat-bar{flex:1;height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden}
    .threat-bar-fill{height:100%;border-radius:2px}
    .threat-val{font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace}

    /* Network visualization */
    .network-section{margin:2rem 0}
    .network-title{font-size:1.1rem;font-weight:700;margin-bottom:.5rem}
    .network-sub{font-size:.82rem;color:var(--text2);margin-bottom:1rem}
    #network-canvas{width:100%;height:500px;background:#0F172A;border-radius:var(--radius);cursor:grab}
    #network-canvas:active{cursor:grabbing}

    .footer{text-align:center;padding:1.5rem;margin-top:2rem;border-top:1px solid var(--border);color:var(--text2);font-size:.78rem}

    @media(max-width:768px){
      .container{padding:1rem}
      .agents-hero h1{font-size:1.5rem}
      .agent-grid{grid-template-columns:1fr}
      .impact-cat{min-width:80px;font-size:.7rem}
      #network-canvas{height:350px}
    }
  </style>
</head>

  // Filters
  const filterBar=document.getElementById('filter-bar');
  filterBar.innerHTML=`<button class="filter-btn active" data-cat="all">전체 (${totalAgents})</button>`+
    Object.entries(agentCategories).map(([k,v])=>{
      const count=agents.filter(a=>a.cat===k).length;
      return `<button class="filter-btn" data-cat="${k}">${v.name} (${count})</button>`;
    }).join('');

  filterBar.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.onclick=()=>{
      filterBar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter=btn.dataset.cat;
      renderCards();
    };
  });

  renderImpact(allJobs);
  renderCards();
  renderNetwork();
}

function renderImpact(allJobs){
  // Calculate per-category how many unique jobs each AI category threatens
  const catImpact=Object.entries(agentCategories).map(([k,v])=>{
    const catAgents=agents.filter(a=>a.cat===k);
    const jobsAffected=new Set(catAgents.flatMap(a=>a.replaces));
    // Calculate average risk of affected jobs
    const matchedJobs=allJobs.filter(j=>jobsAffected.has(j.name));
    const avgRisk=matchedJobs.length?Math.round(matchedJobs.reduce((s,j)=>s+j.risk,0)/matchedJobs.length):0;
    return {key:k,...v,agents:catAgents.length,jobs:jobsAffected.size,avgRisk};
  }).sort((a,b)=>b.jobs-a.jobs);

  const maxJobs=Math.max(...catImpact.map(c=>c.jobs));
  const bars=document.getElementById('impact-bars');
  bars.innerHTML=catImpact.map(c=>`
    <div class="impact-row">
      <div class="impact-cat">${c.name}</div>
      <div class="impact-bar">
        <div class="impact-bar-fill" style="width:${c.jobs/maxJobs*100}%;background:${c.color}" data-width="${c.jobs/maxJobs*100}">
          <span class="impact-bar-text">${c.agents}개 도구 &rarr; ${c.jobs}개 직업</span>
        </div>
      </div>
      <div class="impact-val" style="color:${c.color}">${c.avgRisk}%</div>
    </div>
  `).join('');

  // Animate bars
  setTimeout(()=>{
    bars.querySelectorAll('.impact-bar-fill').forEach(el=>{
      const w=el.dataset.width;
      el.style.width='0%';
      setTimeout(()=>el.style.width=w+'%',50);
    });
  },100);
}

function renderCards(){
  const grid=document.getElementById('agent-grid');
  const filtered=currentFilter==='all'?agents:agents.filter(a=>a.cat===currentFilter);
  const sorted=[...filtered].sort((a,b)=>b.threat-a.threat);

  grid.innerHTML=sorted.map(agent=>{
    const cat=agentCategories[agent.cat];
    const threatColor=agent.threat>=80?'#EF4444':agent.threat>=60?'#F59E0B':'#10B981';
    return `
      <div class="agent-card">
        <div class="agent-card-header">
          <span class="agent-cat-badge" style="background:${cat.color}">${cat.name}</span>
          <span class="agent-name">${agent.name}</span>
          <span class="agent-company">${agent.company}</span>
        </div>
        <div class="agent-card-body">
          <div class="agent-desc">${agent.desc}</div>
          <div class="agent-replaces">
            <div class="agent-replaces-title">대체 위협 직업</div>
            <div class="agent-job-tags">${agent.replaces.map(j=>`<span class="agent-job-tag" onclick="findJobRisk('${j}')">${j}</span>`).join('')}</div>
          </div>
          <div class="threat-meter">
            <span class="threat-label">위협도</span>
            <div class="threat-bar"><div class="threat-bar-fill" style="width:${agent.threat}%;background:${threatColor}"></div></div>
            <span class="threat-val" style="color:${threatColor}">${agent.threat}%</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('cards-title').textContent=
    currentFilter==='all'?`전체 AI 도구 (${sorted.length})`:
    `${agentCategories[currentFilter].name} (${sorted.length})`;
}

function findJobRisk(jobName){
  window.open(`./?search=${encodeURIComponent(jobName)}`,'_self');
}

// === Network Visualization ===
function renderNetwork(){
  const canvas=document.getElementById('network-canvas');
  const ctx=canvas.getContext('2d');
  let w=canvas.clientWidth,h=canvas.clientHeight;
  canvas.width=w*2;canvas.height=h*2;
  ctx.scale(2,2);

  // Build nodes
  const nodes=[];
  const links=[];
  const jobSet=new Set();

  agents.forEach((a,i)=>{
    const cat=agentCategories[a.cat];
    nodes.push({
      id:'a_'+i,type:'agent',label:a.name,
      x:w*0.3+Math.random()*w*0.4,
      y:h*0.2+Math.random()*h*0.6,
      vx:0,vy:0,
      color:cat.color,radius:6+a.threat*0.06
    });
    a.replaces.forEach(j=>{
      if(!jobSet.has(j)){
        jobSet.add(j);
        // Find risk
        let risk=50;
        if(jobsData){
          const found=jobsData.categories.flatMap(c=>c.jobs).find(jj=>jj.name===j);
          if(found)risk=found.risk;
        }
        const rColor=risk>=86?'#991B1B':risk>=61?'#EF4444':risk>=31?'#F59E0B':'#10B981';
        nodes.push({
          id:'j_'+j,type:'job',label:j,
          x:w*0.2+Math.random()*w*0.6,
          y:h*0.1+Math.random()*h*0.8,
          vx:0,vy:0,
          color:rColor,radius:4+risk*0.03,risk
        });
      }
      links.push({source:'a_'+i,target:'j_'+j});
    });
  });

  let hovered=null;
  let dragNode=null;
  let offsetX=0,offsetY=0;

  function getNode(mx,my){
    for(let i=nodes.length-1;i>=0;i--){
      const n=nodes[i];
      const dx=mx-n.x,dy=my-n.y;
      if(dx*dx+dy*dy<(n.radius+4)*(n.radius+4))return n;
    }
    return null;
  }

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    if(dragNode){
      dragNode.x=mx;dragNode.y=my;
      dragNode.vx=0;dragNode.vy=0;
    }else{
      hovered=getNode(mx,my);
      canvas.style.cursor=hovered?'pointer':'grab';
    }
  });
  canvas.addEventListener('mousedown',e=>{
    const rect=canvas.getBoundingClientRect();
    dragNode=getNode(e.clientX-rect.left,e.clientY-rect.top);
  });
  canvas.addEventListener('mouseup',()=>{dragNode=null});
  canvas.addEventListener('mouseleave',()=>{hovered=null;dragNode=null});

  // Simple force simulation
  function simulate(){
    // Repulsion between nodes
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        let dx=b.x-a.x,dy=b.y-a.y;
        let dist=Math.sqrt(dx*dx+dy*dy)||1;
        const minDist=30;
        if(dist<minDist){
          const force=(minDist-dist)*0.02;
          const fx=dx/dist*force;
          const fy=dy/dist*force;
          a.vx-=fx;a.vy-=fy;
          b.vx+=fx;b.vy+=fy;
        }
      }
    }

    // Attraction along links
    links.forEach(l=>{
      const a=nodes.find(n=>n.id===l.source);
      const b=nodes.find(n=>n.id===l.target);
      if(!a||!b)return;
      let dx=b.x-a.x,dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||1;
      const targetDist=80;
      const force=(dist-targetDist)*0.003;
      const fx=dx/dist*force;
      const fy=dy/dist*force;
      a.vx+=fx;a.vy+=fy;
      b.vx-=fx;b.vy-=fy;
    });

    // Center gravity
    nodes.forEach(n=>{
      if(n===dragNode)return;
      n.vx+=(w/2-n.x)*0.0005;
      n.vy+=(h/2-n.y)*0.0005;
      n.vx*=0.9;n.vy*=0.9;
      n.x+=n.vx;n.y+=n.vy;
      n.x=Math.max(n.radius,Math.min(w-n.radius,n.x));
      n.y=Math.max(n.radius,Math.min(h-n.radius,n.y));
    });
  }

  function draw(){
    ctx.clearRect(0,0,w,h);

    // Draw links
    links.forEach(l=>{
      const a=nodes.find(n=>n.id===l.source);
      const b=nodes.find(n=>n.id===l.target);
      if(!a||!b)return;
      const isHighlighted=hovered&&(hovered.id===a.id||hovered.id===b.id);
      ctx.strokeStyle=isHighlighted?'rgba(239,68,68,.4)':'rgba(255,255,255,.06)';
      ctx.lineWidth=isHighlighted?1.5:0.5;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    });

    // Draw nodes
    nodes.forEach(n=>{
      const isHighlighted=hovered&&(
        hovered.id===n.id||
        links.some(l=>(l.source===hovered.id&&l.target===n.id)||(l.target===hovered.id&&l.source===n.id))
      );
      const alpha=hovered?(isHighlighted?1:0.15):0.7;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=n.color;
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.radius,0,Math.PI*2);
      ctx.fill();

      // Label
      if(isHighlighted||n.radius>7){
        ctx.font=`${n.type==='agent'?'600':'400'} ${n.type==='agent'?10:8}px Noto Sans KR`;
        ctx.fillStyle='#fff';
        ctx.textAlign='center';
        ctx.fillText(n.label,n.x,n.y+n.radius+12);
      }
      ctx.globalAlpha=1;
    });

    // Tooltip
    if(hovered){
      const connectedCount=links.filter(l=>l.source===hovered.id||l.target===hovered.id).length;
      const text=hovered.type==='agent'?
        `${hovered.label} — ${connectedCount}개 직업 위협`:
        `${hovered.label} — ${connectedCount}개 AI 도구가 위협 (리스크 ${hovered.risk||'?'}%)`;
      ctx.font='500 11px Noto Sans KR';
      const tw=ctx.measureText(text).width+16;
      const tx=Math.min(hovered.x-tw/2,w-tw-10);
      const ty=hovered.y-hovered.radius-28;
      ctx.fillStyle='rgba(15,23,42,.9)';
      ctx.beginPath();
      ctx.roundRect(tx,ty,tw,22,4);
      ctx.fill();
      ctx.fillStyle='#fff';
      ctx.textAlign='left';
      ctx.fillText(text,tx+8,ty+15);
    }

    simulate();
    requestAnimationFrame(draw);
  }

  // Handle resize
  window.addEventListener('resize',()=>{
    w=canvas.clientWidth;h=canvas.clientHeight;
    canvas.width=w*2;canvas.height=h*2;
    ctx.scale(2,2);
  });

  draw();
}

document.addEventListener('DOMContentLoaded',init);
</script>
