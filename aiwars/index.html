<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI WARS: THE SIMULATION</title>
<style>
:root{--sb:min(340px,23vw);--fs:clamp(12px,1.1vw,18px);--fsl:clamp(14px,1.3vw,22px);--fsh:clamp(10px,.9vw,15px)}
@media(min-width:1400px){:root{--fs:clamp(15px,1.2vw,20px);--fsl:clamp(17px,1.4vw,24px);--fsh:clamp(12px,1vw,16px);--sb:min(380px,24vw)}}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#0f0;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

/* LANG SELECT */
#langSelect{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center}
#langSelect h1{font-size:clamp(40px,5vw,60px);color:#0f0;text-shadow:0 0 50px #0f0,0 0 100px #0f0;margin-bottom:8px;letter-spacing:10px;animation:tp 2s ease-in-out infinite}
@keyframes tp{0%,100%{text-shadow:0 0 50px #0f0,0 0 100px #0f0}50%{text-shadow:0 0 80px #0ff,0 0 160px #0ff}}
#langSelect .st{font-size:clamp(12px,1.2vw,16px);color:#888;margin-bottom:40px;letter-spacing:3px}
.lang-btns{display:flex;gap:20px}
.lang-btn{padding:20px 50px;border:2px solid #0f0;border-radius:12px;background:rgba(0,255,0,.05);color:#0f0;font-family:'Courier New',monospace;font-size:clamp(16px,1.5vw,22px);cursor:pointer;transition:.3s;letter-spacing:2px}
.lang-btn:hover{background:rgba(0,255,0,.2);transform:scale(1.1);box-shadow:0 0 40px rgba(0,255,0,.4)}
.lang-btn .flag{font-size:clamp(28px,3vw,40px);display:block;margin-bottom:8px}

/* TOP BAR */
#topBar{position:fixed;top:0;left:0;right:0;height:clamp(50px,5vh,65px);display:flex;align-items:center;padding:0 20px;background:linear-gradient(180deg,rgba(0,0,0,.95) 60%,transparent);z-index:10;pointer-events:none}
#yearDisplay{font-size:clamp(36px,3.5vw,52px);font-weight:bold;color:#0f0;text-shadow:0 0 30px #0f0,0 0 60px #0f0;min-width:100px}
#eventDisplay{font-size:clamp(13px,1.2vw,18px);color:#ff0;text-align:center;flex:1;padding:0 15px;text-shadow:0 0 15px #ff0;line-height:1.3}

/* DEV LINKS */
#devLinks{position:fixed;top:12px;right:calc(var(--sb) + 12px);z-index:20;display:flex;gap:8px;pointer-events:all}
#devLinks a{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:clamp(9px,.7vw,11px);text-decoration:none;font-family:'Courier New',monospace;transition:.2s;opacity:.5}
#devLinks a:hover{opacity:1;transform:scale(1.05)}
#devLinks .dl-x{color:#fff;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05)}
#devLinks .dl-gh{color:#ccc;border:1px solid rgba(200,200,200,.15);background:rgba(200,200,200,.04)}

/* TIMELINE */
#timelineBar{position:fixed;top:clamp(50px,5vh,65px);left:20px;right:calc(var(--sb) + 10px);height:5px;background:rgba(0,255,0,.1);border-radius:3px;z-index:10;pointer-events:none}
#timelineFill{height:100%;background:linear-gradient(90deg,#0f0,#0ff,#f0f);border-radius:3px;width:0%;transition:width .2s}
#seedLabel{position:fixed;top:calc(clamp(50px,5vh,65px) + 6px);left:20px;font-size:9px;color:#444;z-index:10;pointer-events:none}

/* BOTTOM HUMAN HISTORY TICKER */
#humanHistory{position:fixed;bottom:0;left:0;right:var(--sb);height:32px;background:linear-gradient(0deg,rgba(0,0,0,.92),rgba(0,0,0,.3));z-index:10;pointer-events:none;overflow:hidden;border-top:1px solid rgba(100,100,255,.15);display:flex;align-items:center}
#humanHistory .ticker{display:flex;white-space:nowrap;align-items:center;height:100%;transition:transform .5s ease-out}
#humanHistory .tick-item{padding:0 clamp(15px,2vw,30px);font-size:clamp(10px,.9vw,13px);color:rgba(150,150,255,.5);flex-shrink:0;transition:all .3s}
#humanHistory .tick-item.past{color:rgba(150,150,255,.35)}
#humanHistory .tick-item.current{color:#ff0;font-weight:bold;text-shadow:0 0 10px rgba(255,255,0,.5);font-size:clamp(11px,1vw,14px)}
#humanHistory .tick-item.future{color:rgba(100,100,150,.25)}
#humanHistory .tick-item .tick-yr{font-weight:bold;margin-right:5px}
#humanHistory .tick-now{color:#0f0;font-weight:bold;font-size:clamp(11px,1vw,14px);padding:0 15px;flex-shrink:0;text-shadow:0 0 8px #0f0}

/* RIGHT SIDEBAR */
#sidebar{position:fixed;top:0;right:0;width:var(--sb);height:100%;background:linear-gradient(270deg,rgba(0,0,0,.97) 85%,transparent);z-index:10;display:flex;flex-direction:column;overflow:hidden}
#sideTop{padding:10px 12px 0;flex-shrink:0}
#sideTop h3{color:#0f0;font-size:var(--fsl);margin-bottom:6px;letter-spacing:3px;text-shadow:0 0 8px #0f0}
.lb-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin:2px 0;font-size:var(--fsl);border-radius:4px;background:rgba(0,255,0,.03);border:1px solid rgba(0,255,0,.06);cursor:pointer;pointer-events:all;transition:.2s}
.lb-item:hover{background:rgba(0,255,0,.15);border-color:#0f0}
.lb-item .n{color:#fff;font-size:var(--fsl);font-weight:bold}.lb-item .p{color:#0ff;font-weight:bold;font-size:var(--fsl)}
.lb-badge{display:inline-block;font-size:clamp(14px,1.2vw,18px);margin-right:3px;vertical-align:middle}
#lbHint{font-size:var(--fsh);color:#555;margin-top:4px;text-align:center;pointer-events:none}
/* MODEL INFO MODAL */
#modelModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:40;display:none;align-items:center;justify-content:center;cursor:pointer}
#modelModalInner{background:rgba(5,5,20,.97);border:2px solid #0f0;border-radius:14px;padding:20px 24px;max-width:min(500px,80vw);max-height:80vh;overflow-y:auto;cursor:default;position:relative;box-shadow:0 0 60px rgba(0,255,0,.2)}
#modelModalInner::-webkit-scrollbar{width:3px}
#modelModalInner::-webkit-scrollbar-thumb{background:#0f066}
#modelModalClose{position:absolute;top:10px;right:14px;font-size:22px;color:#888;cursor:pointer;transition:.2s;pointer-events:all}
#modelModalClose:hover{color:#fff;transform:scale(1.2)}
#modelModalTitle{color:#0ff;font-size:var(--fsl);margin-bottom:10px;padding-right:30px}
#companyDetail{display:none}
#companyDetail h4{color:#0ff;font-size:var(--fsl);margin-bottom:5px}
.model-item{font-size:var(--fs);color:#aaa;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.model-item .yr{color:#0f0;font-weight:bold;margin-right:4px}
.model-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:var(--fsh);font-weight:bold;margin-left:3px}
.tag-llm{background:rgba(0,221,221,.15);color:#0dd}
.tag-vision{background:rgba(255,136,0,.15);color:#f80}
.tag-genai{background:rgba(255,0,255,.15);color:#f0f}
.tag-agent{background:rgba(0,255,0,.15);color:#0f0}
.tag-paper{background:rgba(255,255,0,.15);color:#ff0}
.tag-hw{background:rgba(118,185,0,.15);color:#76b900}
#divider{height:1px;background:rgba(0,255,0,.12);margin:5px 0;flex-shrink:0}
#histTitle{padding:4px 12px 2px;flex-shrink:0}
#histTitle h3{color:#ff0;font-size:var(--fs);letter-spacing:2px;text-shadow:0 0 6px #ff0}
#historyFeed{flex:1;overflow-y:auto;padding:0 12px 12px;pointer-events:all}
#historyFeed::-webkit-scrollbar{width:3px}
#historyFeed::-webkit-scrollbar-thumb{background:#0f066}
.hist-entry{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:var(--fs);line-height:1.5;animation:histIn .4s ease-out}
.hist-entry:first-child{background:rgba(255,255,0,.08);border-left:3px solid #ff0;padding-left:8px;margin-left:-8px}
@keyframes histIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.hist-entry .h-yr{color:#0f0;font-weight:bold;font-size:var(--fs)}
.hist-entry .h-ev{color:#ff0;font-size:var(--fs);font-weight:bold}
.hist-entry .h-desc{color:#ccc;font-size:var(--fs)}
.hist-entry .h-dlg{color:#f80;font-style:italic;font-size:var(--fs)}
.hist-entry .h-new{color:#fff;font-weight:bold}
.h-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:var(--fsh);font-weight:bold;margin:0 2px;vertical-align:middle}
.hb-battle{background:rgba(255,68,68,.2);color:#f44}
.hb-paper{background:rgba(255,255,0,.15);color:#ff0}
.hb-model{background:rgba(0,221,221,.15);color:#0dd}
.hb-nation{background:rgba(255,136,0,.15);color:#f80}
.hb-boom{background:rgba(255,0,255,.15);color:#f0f}

/* CEO INTRO CARD (non-blocking flash) */
#ceoCard{position:fixed;top:15%;left:50%;transform:translateX(-50%);z-index:27;display:none;pointer-events:none;text-align:center;animation:ceoIn .5s ease-out}
@keyframes ceoIn{from{opacity:0;transform:translateX(-50%) translateY(-30px) scale(.8)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
#ceoCard.ceo-out{animation:ceoOut .5s ease-in forwards}
@keyframes ceoOut{to{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}}
#ceoCard .ceo-inner{display:flex;align-items:center;gap:14px;background:rgba(0,0,0,.92);border:2px solid rgba(255,200,0,.4);border-radius:14px;padding:12px 18px;box-shadow:0 0 40px rgba(255,200,0,.2)}
#ceoCard .ceo-photo{width:clamp(60px,7vw,85px);height:clamp(60px,7vw,85px);border-radius:50%;object-fit:cover;border:2px solid #ffc800;flex-shrink:0;background:#111}
#ceoCard .ceo-photo-em{width:clamp(60px,7vw,85px);height:clamp(60px,7vw,85px);border-radius:50%;border:2px solid #ffc800;flex-shrink:0;background:#111;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,3.5vw,42px)}
#ceoCard .ceo-info{text-align:left;max-width:min(350px,45vw)}
#ceoCard .ceo-name{font-size:clamp(15px,1.4vw,20px);font-weight:bold;color:#ffc800;margin-bottom:3px}
#ceoCard .ceo-role{font-size:clamp(10px,.9vw,13px);color:#0ff;margin-bottom:6px}
#ceoCard .ceo-quote{font-size:clamp(11px,1vw,14px);color:#fff;font-style:italic;line-height:1.4}
#ceoCard .ceo-quote::before{content:'"';color:#ffc800;font-size:1.2em}
#ceoCard .ceo-quote::after{content:'"';color:#ffc800;font-size:1.2em}
#ceoCard .ceo-deceased{font-size:clamp(9px,.8vw,11px);color:#888;margin-top:4px}

/* EVENT CARD (AI milestones - non-blocking flash) */
#eventCard{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:28;display:none;pointer-events:none;text-align:center;max-width:min(500px,70vw);animation:ecIn .4s ease-out}
@keyframes ecIn{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#eventCard.ec-out{animation:ecOut .5s ease-in forwards}
@keyframes ecOut{to{opacity:0;transform:translate(-50%,-55%) scale(.9)}}
#eventCard .ec-img{width:min(260px,38vw);height:min(160px,22vw);object-fit:cover;border-radius:10px;border:2px solid #0f0;box-shadow:0 0 40px rgba(0,255,0,.4);margin-bottom:10px;background:#111}
#eventCard .ec-img-placeholder{width:min(260px,38vw);height:min(160px,22vw);border-radius:10px;border:2px solid;box-shadow:0 0 40px rgba(0,255,0,.3);margin:0 auto 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080808;font-size:clamp(36px,4.5vw,56px)}
#eventCard .ec-title{font-size:clamp(15px,1.4vw,20px);font-weight:bold;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.5);margin-bottom:5px}
#eventCard .ec-type{display:inline-block;padding:2px 10px;border-radius:10px;font-size:var(--fsh);font-weight:bold;margin-bottom:6px}
#eventCard .ec-desc{font-size:var(--fs);color:#ccc;line-height:1.4;max-width:min(420px,60vw);margin:0 auto;background:rgba(0,0,0,.85);padding:8px 12px;border-radius:8px;border:1px solid rgba(0,255,0,.15)}

/* HISTORY FLASH (human history - floats in from left, drifts out) */
#histFlash{position:fixed;bottom:45px;left:20px;z-index:15;pointer-events:none;display:none;animation:hfIn .6s ease-out}
@keyframes hfIn{from{opacity:0;transform:translateY(30px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
#histFlash.hf-out{animation:hfOut .6s ease-in forwards}
@keyframes hfOut{to{opacity:0;transform:translateY(-20px) scale(.9)}}
#histFlash .hf-inner{display:flex;align-items:center;gap:10px;background:rgba(0,0,20,.88);border:1px solid rgba(100,100,255,.25);border-radius:10px;padding:8px 14px;box-shadow:0 0 25px rgba(80,80,200,.2)}
#histFlash .hf-img{width:clamp(60px,8vw,90px);height:clamp(45px,6vw,65px);object-fit:cover;border-radius:6px;border:1px solid rgba(100,100,255,.3);flex-shrink:0;background:#111}
#histFlash .hf-img-em{width:clamp(60px,8vw,90px);height:clamp(45px,6vw,65px);border-radius:6px;border:1px solid rgba(100,100,255,.3);flex-shrink:0;background:#080818;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,3vw,36px)}
#histFlash .hf-text{max-width:min(300px,40vw)}
#histFlash .hf-yr{font-size:clamp(12px,1.1vw,15px);color:rgba(100,180,255,.8);font-weight:bold}
#histFlash .hf-title{font-size:clamp(11px,1vw,14px);color:rgba(180,180,220,.7);line-height:1.3}

/* OVERLAYS */
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:25;pointer-events:none;display:flex;align-items:center;justify-content:center}
#overlayText{font-size:clamp(60px,8vw,120px);font-weight:bold;color:#ff0;text-shadow:0 0 60px #ff0,0 0 120px #f80;display:none;text-align:center}
#breakingNews{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-size:clamp(15px,1.3vw,20px);color:#f00;text-shadow:0 0 20px #f00;z-index:29;display:none;pointer-events:none;text-align:center;max-width:min(550px,75vw);padding:20px;border:2px solid #f00;background:rgba(0,0,0,.94);border-radius:12px}
.bn-lbl{font-size:clamp(18px,1.6vw,24px);letter-spacing:5px;margin-bottom:8px;animation:bnf .5s infinite}
@keyframes bnf{0%,100%{opacity:1}50%{opacity:.3}}
#battleResult{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,3vw,40px);color:#0f0;text-shadow:0 0 50px #0f0;z-index:29;display:none;pointer-events:none;text-align:center;white-space:pre-line}
#tooltip{position:fixed;display:none;background:rgba(0,0,0,.96);border:1px solid #0f0;border-radius:10px;padding:12px;z-index:30;pointer-events:none;max-width:min(280px,35vw);font-size:var(--fs);box-shadow:0 0 25px rgba(0,255,0,.4)}

/* FINAL */
#finalScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#finalScreen h1{font-size:clamp(28px,3.5vw,42px);color:#ff0;text-shadow:0 0 50px #ff0;margin-bottom:6px;letter-spacing:5px}
#finalScreen h2{font-size:clamp(13px,1.2vw,17px);color:#0f0;margin-bottom:14px}
#finalRankings{max-width:min(700px,85vw);width:100%;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.fr{display:flex;align-items:center;padding:7px 10px;border-radius:6px;background:rgba(0,255,0,.04);border:1px solid rgba(0,255,0,.1)}
.fr .rn{font-size:clamp(14px,1.3vw,20px);font-weight:bold;color:#ff0;width:32px;flex-shrink:0}
.fr .rm{flex:1;font-size:clamp(11px,1vw,14px);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr .rp{font-size:clamp(11px,1vw,14px);color:#0ff;font-weight:bold;flex-shrink:0;margin-left:6px}
.fr.top3{border-color:#ff0;background:rgba(255,255,0,.06);grid-column:span 2;padding:10px 14px}
.fr.top3 .rn{font-size:clamp(20px,2vw,28px);width:38px}
.fr.top3 .rm{font-size:clamp(14px,1.2vw,18px)}
.fr.top3 .rp{font-size:clamp(14px,1.2vw,18px)}
#tauntBox{max-width:min(600px,80vw);margin:0 auto 14px;text-align:center}
#tauntMsg{font-size:clamp(14px,1.3vw,19px);color:#f80;font-weight:bold;line-height:1.5;text-shadow:0 0 15px rgba(255,136,0,.4);animation:tauntPulse 1.5s ease-in-out infinite}
@keyframes tauntPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.02)}}
#tauntSub{font-size:clamp(11px,1vw,14px);color:#ff0;margin-top:6px;opacity:.8}
#rivalTag{display:inline-block;padding:3px 12px;border-radius:6px;font-size:clamp(12px,1.1vw,16px);font-weight:bold;margin-top:8px;animation:rivalGlow 1s ease-in-out infinite alternate}
@keyframes rivalGlow{from{box-shadow:0 0 10px currentColor}to{box-shadow:0 0 30px currentColor}}
#finalBtns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
#finalBtns button{padding:11px 24px;border:2px solid;border-radius:8px;background:rgba(0,0,0,.5);font-family:'Courier New',monospace;font-size:clamp(11px,1vw,14px);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
#finalBtns button:hover{transform:scale(1.08)}
.btn-r{border-color:#0f0!important;color:#0f0}.btn-r:hover{background:rgba(0,255,0,.2)!important}
.btn-t{border-color:#1da1f2!important;color:#1da1f2}.btn-t:hover{background:rgba(29,161,242,.2)!important}
.btn-s{border-color:#ff0!important;color:#ff0}.btn-s:hover{background:rgba(255,255,0,.2)!important}

/* NATION ENTRY BANNER */
#nationBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:28;display:none;pointer-events:none;text-align:center;padding:clamp(20px,3vw,35px) clamp(30px,4vw,55px);background:rgba(0,0,0,.94);border:3px solid #ff0;border-radius:16px;box-shadow:0 0 60px rgba(255,255,0,.3);animation:nationIn .5s ease-out}
@keyframes nationIn{from{opacity:0;transform:translate(-50%,-50%) scale(.5)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#nationBanner .nb-flag{font-size:clamp(48px,6vw,80px);margin-bottom:8px}
#nationBanner .nb-country{font-size:clamp(20px,2.5vw,32px);font-weight:bold;color:#ff0;text-shadow:0 0 20px #ff0;letter-spacing:4px}
#nationBanner .nb-company{font-size:clamp(13px,1.3vw,18px);color:#0ff;margin-top:6px}
#nationBanner .nb-motto{font-size:clamp(10px,1vw,14px);color:#f80;margin-top:8px;font-style:italic}

/* PUBLIC VOICE — mini person + speech bubble (top-right) */
#publicVoice{position:fixed;top:80px;right:calc(var(--sb) + 15px);z-index:14;pointer-events:none;display:none;animation:pvIn .5s ease-out}
@keyframes pvIn{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
#publicVoice.pv-out{animation:pvOut .4s ease-in forwards}
@keyframes pvOut{to{opacity:0;transform:translateY(-20px)}}
#publicVoice .pv-wrap{display:flex;align-items:flex-end;gap:6px}
#publicVoice .pv-person{font-size:clamp(22px,2.5vw,32px)}
#publicVoice .pv-bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px 10px 10px 2px;padding:6px 12px;max-width:min(320px,40vw);font-size:clamp(11px,1vw,14px);color:rgba(255,255,255,.75);line-height:1.4}
#publicVoice .pv-handle{font-size:clamp(9px,.8vw,11px);color:rgba(255,255,255,.35);margin-top:2px}

.shake{animation:sk .3s ease-out}
@keyframes sk{0%,100%{transform:translate(0)}10%{transform:translate(-14px,10px)}20%{transform:translate(14px,-10px)}30%{transform:translate(-10px,7px)}40%{transform:translate(10px,-7px)}50%{transform:translate(-6px,4px)}60%{transform:translate(6px,-4px)}70%{transform:translate(-3px,2px)}80%{transform:translate(3px,-2px)}}
</style>
</head>
<body>
<div id="langSelect"><h1>AI WARS</h1><div class="st">THE SIMULATION</div>

let ac=null;
function initAudio(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)}
function snd(type){if(!ac)return;try{
  if(type==='punch'){const b=ac.createBuffer(1,ac.sampleRate*.12,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/ac.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*25)+Math.sin(t*200)*.7*Math.exp(-t*18)}const n=ac.createBufferSource();n.buffer=b;const g=ac.createGain();g.gain.value=.3;n.connect(g);g.connect(ac.destination);n.start()}
  else if(type==='boom'){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(500,ac.currentTime);o.frequency.exponentialRampToValueAtTime(35,ac.currentTime+.5);g.gain.setValueAtTime(.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.5)}
  else if(type==='up'){[440,554,659,880].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.15,ac.currentTime+i*.06);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.06+.12);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*.06);o.stop(ac.currentTime+i*.06+.12)})}
  else if(type==='tick'){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=1400;g.gain.setValueAtTime(.05,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.03);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.03)}
  else if(type==='rumble'){const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.value=55;g.gain.setValueAtTime(.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.7);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.7)}
  else if(type==='fanfare'){[523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.12,ac.currentTime+i*.1);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.1+.25);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*.1);o.stop(ac.currentTime+i*.1+.25)})}
  else if(type==='combo'){const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.setValueAtTime(600+G.comboCount*100,ac.currentTime);o.frequency.exponentialRampToValueAtTime(1200+G.comboCount*150,ac.currentTime+.1);g.gain.setValueAtTime(.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.15)}
  else if(type==='wow'){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.exponentialRampToValueAtTime(800,ac.currentTime+.6);g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.8);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.8)}
  else if(type==='clap'){for(let i=0;i<3;i++){const b=ac.createBuffer(1,ac.sampleRate*.05,ac.sampleRate),d=b.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/ac.sampleRate*40);const n=ac.createBufferSource();n.buffer=b;const g=ac.createGain();g.gain.value=.15;n.connect(g);g.connect(ac.destination);n.start(ac.currentTime+i*.12)}}
}catch(e){}}

// CEO intro flash (non-blocking)
let ceoCardTimer=null;
function showCeoIntro(ceo){
  try{
  const card=document.getElementById('ceoCard');
  card.classList.remove('ceo-out');
  const wrap=document.getElementById('ceoPhotoWrap');
  if(ceo.img){
    wrap.innerHTML=`<img class="ceo-photo" src="images/ceo/${ceo.img}" onerror="this.parentElement.innerHTML='<div class=\\'ceo-photo-em\\'>${ceo.em}</div>'">`;
  }else{
    wrap.innerHTML=`<div class="ceo-photo-em">${ceo.em}</div>`;
  }
  document.getElementById('ceoName').textContent=ceo.name;
  document.getElementById('ceoRole').textContent=ceo.role[LANG]||ceo.role.en;
  document.getElementById('ceoQuote').textContent=ceo.quote[LANG]||ceo.quote.en;
  document.getElementById('ceoDeceased').textContent=ceo.deceased?`✝ ${LANG==='ko'?'영면':'Rest in Peace'}`:'';
  card.style.display='block';
  snd('wow');
  addHist('event',`👤 ${ceo.name}: "${(ceo.quote[LANG]||ceo.quote.en).substring(0,50)}..."`);
  if(ceoCardTimer)clearTimeout(ceoCardTimer);
  ceoCardTimer=setTimeout(()=>{card.classList.add('ceo-out')},2200);
  setTimeout(()=>{card.style.display='none';card.classList.remove('ceo-out')},2700);
  }catch(e){console.warn('ceoIntro err',e)}
}

// Spawn CEO as mini character (persistent — never disappears unless deceased)
function spawnCeo(ceo){
  try{
  if(G.chars.find(c=>c.name===ceo.name))return;
  const m=100,rw=W-getSbWidth()-10;
  const c={
    name:ceo.name,em:ceo.em,col:ceo.col,co:ceo.co,
    tip:{en:ceo.quote.en,ko:ceo.quote.ko},pw:8,obj:false,isCeo:true,
    x:m+Math.random()*(rw-2*m),y:m+Math.random()*(H-2*m),
    vx:(Math.random()-.5)*3+1.5*(Math.random()>.5?1:-1),
    vy:(Math.random()-.5)*3+1.5*(Math.random()>.5?1:-1),
    r:28,sc:.7,frozen:false,glow:false,born:G.gt,dlgCD:0,
    pulse:Math.random()*Math.PI*2,orbA:Math.random()*Math.PI*2,
    orbR:15+Math.random()*20,orbS:.4+Math.random()*.4,
    emotion:'😐',emotionTimer:0,deceased:ceo.deceased,deathYr:ceo.deathYr||9999,
    fading:false,fadeAlpha:1
  };
  G.chars.push(c);
  for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;G.particles.push({x:c.x,y:c.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:c.col,sz:2+Math.random()*3})}
  updCo();
  }catch(err){console.warn('spawnCeo error:',err)}
}

// Handle deceased CEO — quiet fade
function checkDeceasedCeos(){
  const yr=Math.floor(G.year);
  G.chars.forEach(c=>{
    if(c.isCeo&&c.deceased&&yr>=c.deathYr&&!c.fading){
      c.fading=true;
      addHist('event',`✝ ${c.name} ${LANG==='ko'?'영면하다...':LANG==='zh'?'逝世...':LANG==='ja'?'逝去...':'has passed away...'}`);
    }
    if(c.fading){c.fadeAlpha=Math.max(0,c.fadeAlpha-.0005);if(c.fadeAlpha<=0)c.sc=0}
  });
}

// Set CEO emotions based on events
function setCeoEmotion(emotion,duration){
  G.chars.filter(c=>c.isCeo&&!c.fading).forEach(c=>{
    c.emotion=emotion;c.emotionTimer=duration||3000;
  });
}

let pvTimer=null;
function showPublicVoice(v){
  try{
    const el=document.getElementById('publicVoice');
    el.classList.remove('pv-out');
    document.getElementById('pvPerson').textContent=v.em;
    document.getElementById('pvBubble').textContent=v.t[LANG]||v.t.en;
    document.getElementById('pvHandle').textContent=v.h;
    el.style.display='block';
    if(pvTimer)clearTimeout(pvTimer);
    pvTimer=setTimeout(()=>{el.classList.add('pv-out')},3500);
    setTimeout(()=>{el.style.display='none';el.classList.remove('pv-out')},4000);
  }catch(e){}
}

function badge(cls,txt){return `<span class="h-badge ${cls}">${txt}</span>`}
function addHist(type,text,yr){
  G.history.unshift({type,text,yr:yr||Math.floor(G.year)});
  if(G.history.length>60)G.history.pop();
  const el=document.getElementById('historyFeed');
  el.innerHTML=G.history.slice(0,40).map((h,i)=>{
    const fresh=i===0?' h-new':'';
    const y=`<span class="h-yr">[${h.yr}]</span> `;
    if(h.type==='collision')return`<div class="hist-entry">${y}${badge('hb-boom','CLASH')} <span class="h-dlg">${h.text}</span></div>`;
    if(h.type==='milestone')return`<div class="hist-entry">${y}${h.text.includes('📄')?badge('hb-paper','PAPER'):badge('hb-model','MODEL')} <span class="h-ev${fresh}">${h.text}</span></div>`;
    if(h.type==='event'){
      let b='';
      if(h.text.includes('🏆'))b=badge('hb-battle','WIN');
      else if(h.text.includes('⚠'))b=badge('hb-boom','NEWS');
      else if(h.text.match(/🇰🇷|🇨🇳|🇫🇷|🇯🇵|🇦🇪|🇮🇳|🇩🇪|🇺🇸|🇬🇧/))b=badge('hb-nation','NATION');
      return`<div class="hist-entry">${y}${b}<span class="h-ev${fresh}">${h.text}</span></div>`;
    }
    if(h.type==='story')return`<div class="hist-entry">${y}<span class="h-desc${fresh}">${h.text}</span></div>`;
    return`<div class="hist-entry">${y}<span class="h-desc${fresh}">${h.text}</span></div>`;
  }).join('');
}

const R=42;
function spawn(def){
  if(G.chars.find(c=>c.name===def.name))return;
  const m=120,rw=W-330;
  const c={name:def.name,em:def.em,col:def.col,co:def.co,tip:def.tip,pw:def.pw,obj:!!def.obj,
    x:m+Math.random()*(rw-2*m),y:m+Math.random()*(H-2*m),
    vx:(Math.random()-.5)*5+2.5*(Math.random()>.5?1:-1),vy:(Math.random()-.5)*5+2.5*(Math.random()>.5?1:-1),
    r:def.sz?R*def.sz:R,sc:1,frozen:false,glow:false,born:G.gt,dlgCD:0,
    pulse:Math.random()*Math.PI*2,orbA:Math.random()*Math.PI*2,orbR:25+Math.random()*35,orbS:.6+Math.random()*.6};
  G.chars.push(c);
  for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*10;G.particles.push({x:c.x,y:c.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:2,col:c.col,sz:2+Math.random()*5})}
  for(let i=0;i<24;i++){const a=i/24*Math.PI*2;G.particles.push({x:c.x,y:c.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:1.2,col:'#fff',sz:2,ring:1})}
  snd('up');updCo();
}

function physics(dt){
  const s=dt/1000;G.gt+=s;G.comboTimer=Math.max(0,G.comboTimer-dt);
  if(G.comboTimer<=0)G.comboCount=0;
  const rw=W-getSbWidth()-10;
  G.chars.forEach(c=>{
    if(c.frozen){c.pulse+=s*3;return}
    c.orbA+=c.orbS*s;c.vx+=Math.cos(c.orbA)*c.orbR*s*.35;c.vy+=Math.sin(c.orbA*.7)*c.orbR*s*.35;
    const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    if(spd<2){const f=2/Math.max(spd,.01);c.vx*=f;c.vy*=f}
    if(spd>6){const f=6/spd;c.vx*=f;c.vy*=f}
    c.x+=c.vx;c.y+=c.vy;const r=c.r*c.sc;
    if(c.x-r<0){c.x=r;c.vx=Math.abs(c.vx)*1.15;addSp(r,c.y,c.col,5)}
    if(c.x+r>rw){c.x=rw-r;c.vx=-Math.abs(c.vx)*1.15;addSp(rw-r,c.y,c.col,5)}
    if(c.y-r<70){c.y=70+r;c.vy=Math.abs(c.vy)*1.15}
    if(c.y+r>H-5){c.y=H-5-r;c.vy=-Math.abs(c.vy)*1.15}
    c.pulse+=s*5;c.dlgCD=Math.max(0,c.dlgCD-dt);
    if(Math.random()<.3)G.trails.push({x:c.x,y:c.y,life:.5,col:c.col,sz:c.r*.3});
  });
  for(let i=0;i<G.chars.length;i++){for(let j=i+1;j<G.chars.length;j++){
    const a=G.chars[i],b=G.chars[j];const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const min=a.r*a.sc+b.r*b.sc;
    if(dist<min){
      const nx=dx/dist,ny=dy/dist,ov=(min-dist)/2+3;
      if(!a.frozen){a.x-=nx*ov;a.y-=ny*ov}if(!b.frozen){b.x+=nx*ov;b.y+=ny*ov}
      const bounce=4;if(!a.frozen){a.vx-=nx*bounce;a.vy-=ny*bounce}if(!b.frozen){b.vx+=nx*bounce;b.vy+=ny*bounce}
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      G.comboCount++;G.comboTimer=2000;addSp(mx,my,'#ff0',8+G.comboCount*2);
      if(G.comboCount>1)addSp(mx,my,'#f0f',5);if(G.comboCount>=3){addSp(mx,my,'#0ff',12);shake(3+G.comboCount)}
      snd(G.comboCount>=3?'combo':'punch');if(G.comboCount>=2)shake(2+G.comboCount);
      if(a.dlgCD<=0&&b.dlgCD<=0){const line=getDlg(a,b);if(line){G.dialogues.push({t:line,x:mx,y:my-55,life:3,a:1});a.dlgCD=3500;b.dlgCD=3500;addHist('collision',`💥 ${a.name} vs ${b.name}: "${line}"`)}}
    }
  }}
  G.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.life-=s*2});G.particles=G.particles.filter(p=>p.life>0);
  G.trails.forEach(t=>{t.life-=s*3;t.sz*=.94});G.trails=G.trails.filter(t=>t.life>0);
  G.dialogues.forEach(d=>{d.life-=s;d.a=Math.max(0,d.life/3);d.y-=s*25});G.dialogues=G.dialogues.filter(d=>d.life>0);
  if(G.shakeT>0)G.shakeT-=dt;
  // CEO emotion timers + deceased check
  G.chars.forEach(c=>{if(c.emotionTimer>0){c.emotionTimer-=dt;if(c.emotionTimer<=0)c.emotion='😐'}});
  checkDeceasedCeos();
  // Snowfall
  if(G.snowing){
    const rw=W-getSbWidth()-10;
    for(let i=0;i<3;i++)G.snowflakes.push({x:Math.random()*rw,y:-10,vy:1+Math.random()*2,vx:(Math.random()-.5)*.5,sz:2+Math.random()*4,a:1});
  }
  G.snowflakes.forEach(f=>{f.y+=f.vy;f.x+=f.vx+Math.sin(G.gt*2+f.x*.01)*.3;f.a-=s*.15});
  G.snowflakes=G.snowflakes.filter(f=>f.y<H+10&&f.a>0);
}
function addSp(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*8;G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1+Math.random()*.5,col,sz:1.5+Math.random()*3.5})}}
function getDlg(a,b){const c=DLG.filter(d=>(d.a===a.name&&(d.b===b.name||d.b==='*'))||(d.a===b.name&&(d.b===a.name||d.b==='*')));if(!c.length)return null;const p=G.rng.pick(c);return p.t[LANG]||p.t.en}
function shake(i){G.shakeT=250;G.shakeI=i;cv.classList.add('shake');setTimeout(()=>cv.classList.remove('shake'),250)}

// RENDERING
// ============================================================
const bgC={1950:'#05051a',1960:'#060620',1970:'#050f14',1980:'#120818',1990:'#081208',2000:'#100e06',2010:'#06061e',2020:'#120608'};
function render(){
  cx.save();
  try{
  let sx=0,sy=0;if(G.shakeT>0){const f=G.shakeI*(G.shakeT/250);sx=(Math.random()-.5)*f*3;sy=(Math.random()-.5)*f*3}
  cx.translate(sx,sy);
  cx.fillStyle=G.futureMode?'#08041a':bgC[Math.floor(G.year/10)*10]||'#080808';
  cx.fillRect(-15,-15,W+30,H+30);
  const gO=(G.gt*20)%60;cx.strokeStyle=G.futureMode?'rgba(150,50,255,0.05)':'rgba(60,120,255,0.035)';cx.lineWidth=1;
  for(let x=-60+gO;x<W;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
  for(let y=-60+gO;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}
  if(G.comboCount>=2){cx.globalAlpha=Math.min(1,G.comboTimer/500);cx.font='bold 50px Courier New';cx.textAlign='center';cx.fillStyle=G.comboCount>=5?'#f0f':G.comboCount>=3?'#ff0':'#0ff';cx.fillText(`${G.comboCount}x COMBO!`,(W-310)/2,H-30);cx.globalAlpha=1}
  G.trails.forEach(t=>{cx.globalAlpha=t.life*.4;cx.fillStyle=t.col;cx.beginPath();cx.arc(t.x,t.y,t.sz,0,Math.PI*2);cx.fill()});cx.globalAlpha=1;
  G.particles.forEach(p=>{cx.globalAlpha=Math.min(1,p.life);cx.fillStyle=p.col;if(p.ring){cx.strokeStyle=p.col;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,p.sz+p.life*5,0,Math.PI*2);cx.stroke()}else{cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill()}});cx.globalAlpha=1;
  // Snow
  if(G.snowflakes.length>0){cx.fillStyle='#fff';G.snowflakes.forEach(f=>{cx.globalAlpha=f.a*.7;cx.beginPath();cx.arc(f.x,f.y,f.sz,0,Math.PI*2);cx.fill()});cx.globalAlpha=1}
  G.chars.forEach(c=>{try{
    if(c.sc<=0)return;
    const alpha=c.fadeAlpha!==undefined?c.fadeAlpha:1;
    if(alpha<=0)return;
    cx.globalAlpha=alpha;
    const r=c.r*c.sc,pr=r+Math.sin(c.pulse)*(c.isCeo?2:4);
    // Halo
    const g1=cx.createRadialGradient(c.x,c.y,pr*.3,c.x,c.y,pr*3);g1.addColorStop(0,c.col+'55');g1.addColorStop(1,c.col+'00');cx.fillStyle=g1;cx.beginPath();cx.arc(c.x,c.y,pr*3,0,Math.PI*2);cx.fill();
    // Power glow
    if(c.glow){const g2=cx.createRadialGradient(c.x,c.y,r,c.x,c.y,r*4.5);g2.addColorStop(0,c.col+'88');g2.addColorStop(.5,c.col+'33');g2.addColorStop(1,c.col+'00');cx.fillStyle=g2;cx.beginPath();cx.arc(c.x,c.y,r*4.5,0,Math.PI*2);cx.fill();cx.strokeStyle=c.col+'bb';cx.lineWidth=2;cx.beginPath();cx.arc(c.x,c.y,r*2,c.pulse,c.pulse+Math.PI*1.3);cx.stroke();cx.beginPath();cx.arc(c.x,c.y,r*2.4,c.pulse+Math.PI,c.pulse+Math.PI*2.1);cx.stroke()}
    // Body
    cx.fillStyle=c.fading?'#1a1a1a':'#0a0a0a';cx.strokeStyle=c.fading?'#555':c.col;cx.lineWidth=c.isCeo?2:3;
    cx.beginPath();cx.arc(c.x,c.y,pr,0,Math.PI*2);cx.fill();cx.stroke();
    // Frozen
    if(c.frozen){cx.fillStyle='rgba(100,180,255,0.35)';cx.beginPath();cx.arc(c.x,c.y,pr,0,Math.PI*2);cx.fill();cx.strokeStyle='rgba(150,220,255,0.5)';cx.lineWidth=1;for(let i=0;i<6;i++){const a=c.pulse+i*Math.PI/3;cx.beginPath();cx.moveTo(c.x,c.y);cx.lineTo(c.x+Math.cos(a)*r*1.4,c.y+Math.sin(a)*r*1.4);cx.stroke()}}
    // Emoji
    cx.font=`${pr*1.4}px serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(c.em,c.x,c.y);
    // CEO emotion bubble
    if(c.isCeo&&c.emotion&&c.emotion!=='😐'&&c.emotionTimer>0){
      cx.font=`${Math.max(14,pr*.8)}px serif`;cx.fillText(c.emotion,c.x+pr*.8,c.y-pr*.8);
    }
    // Name label
    cx.font=`bold ${c.isCeo?10:12}px Courier New`;cx.fillStyle=c.fading?'#666':'#fff';
    cx.fillText(c.name,c.x,c.y+pr+(c.isCeo?12:16));
    if(!c.isCeo){cx.font='10px Courier New';cx.fillStyle=c.col;cx.fillText('PWR:'+c.pw,c.x,c.y+pr+28)}
    cx.globalAlpha=1;
  }catch(e){cx.globalAlpha=1}});
  const dlgFs=Math.max(22,Math.min(38,W*0.022));
  G.dialogues.forEach(d=>{cx.globalAlpha=d.a;cx.font=`bold ${dlgFs}px Courier New`;cx.textAlign='center';const m=cx.measureText(d.t),pw=m.width+44,ph=dlgFs*2;cx.fillStyle='rgba(0,0,0,.92)';cx.strokeStyle='#ff0';cx.lineWidth=3;cx.shadowColor='rgba(255,255,0,.4)';cx.shadowBlur=15;cx.beginPath();cx.roundRect(d.x-pw/2,d.y-ph/2,pw,ph,12);cx.fill();cx.stroke();cx.shadowBlur=0;cx.fillStyle='#ff0';cx.fillText(d.t,d.x,d.y+dlgFs*.35)});
  cx.globalAlpha=1;
  }catch(e){console.warn('render inner err',e)}
  cx.restore();
}

async function showNation(evt){
  G.paused=true;
  try{
    G.chars.forEach(c=>{c.frozen=true});
    snd('rumble');shake(10);
    const nb=document.getElementById('nationBanner');
    document.getElementById('nbFlag').textContent=evt.flag;
    document.getElementById('nbCountry').textContent=evt.country[LANG]||evt.country.en;
    document.getElementById('nbCompany').textContent=evt.companies.join(' & ');
    document.getElementById('nbMotto').textContent=evt.motto[LANG]||evt.motto.en;
    nb.style.display='block';
    addHist('event',`${evt.flag} ${evt.country[LANG]||evt.country.en}: ${evt.companies.join(', ')} ${LANG==='ko'?'참전!':LANG==='zh'?'参战！':LANG==='ja'?'参戦！':'enters!'}`);
    await sleep(1800);
    nb.style.display='none';
    const defs=CHARS.filter(d=>evt.companies.includes(d.name));
    for(const d of defs){spawn(d);await sleep(300)}
    G.chars.forEach(c=>{c.frozen=false;c.vx+=(Math.random()-.5)*6;c.vy+=(Math.random()-.5)*6});
    addSp(W/2,H/2,'#ff0',25);shake(8);snd('boom');
  }catch(err){console.warn('showNation error:',err);G.chars.forEach(c=>{c.frozen=false})}
  G.paused=false;
}

// NON-BLOCKING milestone flash — chars keep fighting!
function showMilestone(ms){
  snd('wow');
  // Flash event card — appears, shows briefly, fades out. No pausing.
  const card=document.getElementById('eventCard');
  card.classList.remove('ec-out');

// TIMELINE ENGINE

let lastT=0,yrAcc=0;const SPD=6;
async function processEvt(e){
  G.processing=true;G.paused=true;
  try{
    // Non-blocking types (safety fallback if called directly)
    if(e.type==='milestone'){showMilestone(e.ms);G.paused=false;G.processing=false;return}
    if(e.type==='histflash'){showHistFlash(e.item);G.paused=false;G.processing=false;return}
    if(e.type==='ceointro'){showCeoIntro(e.ceo);spawnCeo(e.ceo);G.paused=false;G.processing=false;return}
    if(e.type==='publicvoice'){showPublicVoice(e.voice);G.paused=false;G.processing=false;return}
    // Blocking types
    if(e.type==='nation'){await showNation(e);G.paused=false;G.processing=false;return}
    const ev=e.ev?.[LANG]||e.ev?.en||'';
    document.getElementById('eventDisplay').textContent=ev;
    document.getElementById('eventDisplay').style.color=e.type==='battle'?'#f44':'#ff0';
    addHist('event',ev,Math.floor(e.yr));
    if(e.type==='spawn'){const defs=CHARS.filter(d=>e.ch.includes(d.name));for(const d of defs){spawn(d);await sleep(250)}await sleep(800)}
    else if(e.type==='fx'){if(e.action==='winter')fxWinter();else if(e.action==='chatgpt')fxChatgpt();else if(e.action==='future')fxFuture();else if(e.action==='purge')fxPurge();else if(e.action==='agi')fxAgi();else if(e.action==='wildcard')fxWildcard();else if(e.action==='conflict')fxConflict();await sleep(2800)}
    else if(e.type==='battle'){await battle(e.bt)}
    else if(e.type==='end'){showFinal();G.processing=false;return}
    document.getElementById('eventDisplay').textContent='';
    G.paused=false;G.processing=false;tryRand(Math.floor(G.year));
  }catch(err){
    console.warn('processEvt error:',e.type,err);
    G.paused=false;G.processing=false; // ALWAYS unstick on error
  }
}

// MAIN LOOP
function loop(now){
  if(!G.running){requestAnimationFrame(loop);return}
  const dt=Math.min(now-lastT,50);lastT=now;
  if(!G.paused&&!G.processing){
    yrAcc+=dt/1000*SPD;
    if(yrAcc>=.5){
      G.year+=.5;yrAcc=0;
      // Process ALL pending events up to current year (drain queue)
      while(G.evtIdx<G.timeline.length&&G.year>=G.timeline[G.evtIdx].yr&&!G.paused&&!G.processing){
        const e=G.timeline[G.evtIdx];G.evtIdx++;
        try{
          // Non-blocking types: fire and continue loop
          if(e.type==='milestone'){showMilestone(e.ms);continue}
          if(e.type==='histflash'){showHistFlash(e.item);continue}
          if(e.type==='ceointro'){showCeoIntro(e.ceo);spawnCeo(e.ceo);continue}
          if(e.type==='publicvoice'){showPublicVoice(e.voice);continue}
          // Blocking types: pause timeline, process async
          processEvt(e);break;
        }catch(err){console.warn('Event error:',e.type,err);continue}
      }
    }
  }
  try{physics(dt)}catch(e){console.warn('physics err',e)}
  try{render()}catch(e){console.warn('render err',e)}
  try{hud()}catch(e){console.warn('hud err',e)}
  requestAnimationFrame(loop);
}

function buildTicker(){
  const el=document.getElementById('histTicker');
  el.innerHTML=HUMAN_HIST.map(h=>`<span class="tick-item" data-yr="${h.yr}"><span class="tick-yr">${h.yr}</span>${h.t[LANG]||h.t.en}</span>`).join('');
}
function updateTicker(){
  const yr=Math.floor(G.year);
  const el=document.getElementById('histTicker');
  const items=el.querySelectorAll('.tick-item');
  let currentIdx=0;
  items.forEach((it,i)=>{
    const iy=parseInt(it.dataset.yr);
    it.classList.remove('past','current','future');
    if(iy<yr)it.classList.add('past');
    else if(iy===yr||( iy<=yr+2&&iy>=yr-2)){it.classList.add('current');currentIdx=i}
    else it.classList.add('future');
  });
  // Scroll to current
  if(items[currentIdx]){
    const offset=items[currentIdx].offsetLeft-window.innerWidth/3;
    el.style.transform=`translateX(${-Math.max(0,offset)}px)`;
  }
}
