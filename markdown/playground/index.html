<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Playground — 실시간 마크다운 에디터</title>
  <meta name="description" content="마크다운을 입력하면 실시간으로 렌더링 결과를 확인하세요. 복사, 다운로드, 공유까지.">
  <meta property="og:title" content="Markdown Playground">
  <meta property="og:description" content="실시간 마크다운 에디터. 입력 즉시 렌더링.">
  <link rel="canonical" href="https://leaf-kit.github.io/markdown/playground/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0D1117;--surface:#161B22;--surface2:#21262D;--surface3:#30363D;
      --text:#E6EDF3;--text2:#8B949E;--text3:#484F58;
      --primary:#58A6FF;--primary-dim:rgba(88,166,255,.12);
      --accent:#BC8CFF;--green:#3FB950;--amber:#D29922;--red:#F85149;
      --border:#30363D;--border-light:#3D444D;
      --mono:'JetBrains Mono',monospace;--sans:'Inter','Noto Sans KR',sans-serif;
      --radius:6px;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6}
    a{color:var(--primary);text-decoration:none}
    ::selection{background:rgba(79,143,247,.25)}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--text3)}

    /* Layout */
    .app{display:flex;flex-direction:column;height:100vh}

    /* Toolbar */
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:48px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .toolbar-left{display:flex;align-items:center;gap:.75rem}
    .toolbar-brand{font-family:var(--sans);font-size:.9rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:.4rem;text-decoration:none}
    .toolbar-brand:hover{text-decoration:none}
    .toolbar-brand svg{color:var(--primary)}
    .toolbar-divider{width:1px;height:20px;background:var(--border)}
    .toolbar-nav{display:flex;gap:.15rem}
    .toolbar-nav a{font-size:.72rem;font-weight:600;padding:.3rem .55rem;border-radius:5px;color:var(--text2);transition:all .12s}
    .toolbar-nav a:hover{color:var(--text);background:var(--surface2);text-decoration:none}
    .toolbar-nav a.active{color:var(--primary);background:var(--primary-dim)}

    .toolbar-center{display:flex;align-items:center;gap:.4rem}
    .toolbar-right{display:flex;align-items:center;gap:.3rem}

    .tb-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .6rem;border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .12s}
    .tb-btn:hover{color:var(--text);border-color:var(--border-light);background:var(--surface3)}
    .tb-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .tb-btn.primary:hover{opacity:.9}
    .tb-btn svg{width:14px;height:14px}
    .tb-btn.success{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);color:var(--green)}

    /* Format buttons */
    .fmt-bar{display:flex;align-items:center;gap:.15rem;padding:0 1rem;height:36px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .fmt-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:.78rem;font-weight:700;transition:all .1s}
    .fmt-btn:hover{color:var(--text);background:var(--surface2)}
    .fmt-btn[title]:hover::after{content:attr(title);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);padding:.1rem .4rem;border-radius:3px;font-size:.6rem;white-space:nowrap;font-family:var(--sans);font-weight:500;pointer-events:none}
    .fmt-btn{position:relative}
    .fmt-sep{width:1px;height:16px;background:var(--border);margin:0 .2rem}

    /* Editor area */
    .editor-area{flex:1;display:flex;min-height:0}

    /* Panels */
    .panel{flex:1;display:flex;flex-direction:column;min-width:0}
    .panel-header{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:32px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-title{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:.3rem}
    .panel-title .dot{width:6px;height:6px;border-radius:50%}
    .panel-actions{display:flex;gap:.2rem}
    .panel-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);border-radius:4px;cursor:pointer;transition:all .1s}
    .panel-btn:hover{color:var(--text);background:var(--surface2)}

    .divider{width:1px;background:var(--border);cursor:col-resize;flex-shrink:0;position:relative;transition:background .15s}
    .divider:hover,.divider.active{background:var(--primary)}
    .divider::after{content:'';position:absolute;top:0;bottom:0;left:-3px;right:-3px}

    /* Editor */
    #editor{flex:1;width:100%;resize:none;border:none;background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.85rem;line-height:1.7;padding:1.25rem;outline:none;tab-size:2;overflow:auto}
    #editor::placeholder{color:var(--text3)}

    /* Preview */
    #preview{flex:1;overflow:auto;padding:1.5rem 2rem;background:var(--bg)}

    /* Preview rendered styles */
    #preview h1{font-size:1.7rem;font-weight:800;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:.3rem;margin:1.5rem 0 .75rem}
    #preview h1:first-child{margin-top:0}
    #preview h2{font-size:1.3rem;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:.25rem;margin:1.5rem 0 .6rem}
    #preview h3{font-size:1.05rem;font-weight:700;color:var(--text);margin:1.2rem 0 .5rem}
    #preview h4{font-size:.92rem;font-weight:700;color:var(--text);margin:1rem 0 .4rem}
    #preview h5{font-size:.85rem;font-weight:700;color:var(--text2);margin:.8rem 0 .3rem}
    #preview h6{font-size:.8rem;font-weight:700;color:var(--text3);margin:.8rem 0 .3rem}
    #preview p{margin:.5rem 0;font-size:.9rem;color:var(--text)}
    #preview strong{font-weight:700;color:var(--text)}
    #preview em{font-style:italic}
    #preview del{text-decoration:line-through;color:var(--text3)}
    #preview a{color:var(--primary)}
    #preview a:hover{text-decoration:underline}
    #preview ul,#preview ol{padding-left:1.5rem;margin:.5rem 0}
    #preview li{margin:.2rem 0;font-size:.9rem}
    #preview li input[type="checkbox"]{margin-right:.4rem}
    #preview blockquote{border-left:3px solid var(--accent);background:rgba(167,139,250,.06);padding:.6rem 1rem;margin:.75rem 0;border-radius:0 var(--radius) var(--radius) 0;color:var(--text2)}
    #preview blockquote p{margin:.2rem 0}
    #preview code{font-family:var(--mono);font-size:.82rem;background:var(--surface2);color:var(--primary);padding:.12rem .4rem;border-radius:4px}
    #preview pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;overflow-x:auto;margin:.75rem 0}
    #preview pre code{background:none;color:var(--text);padding:0;font-size:.82rem;line-height:1.6}
    #preview table{border-collapse:collapse;width:100%;margin:.75rem 0;font-size:.85rem}
    #preview th{background:var(--surface);color:var(--text);font-weight:700;padding:.45rem .7rem;text-align:left;border:1px solid var(--border)}
    #preview td{padding:.45rem .7rem;border:1px solid var(--border);color:var(--text2)}
    #preview tr:hover td{background:var(--surface2)}
    #preview hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
    #preview img{max-width:100%;border-radius:var(--radius);margin:.5rem 0}
    #preview mark{background:rgba(251,191,36,.2);color:var(--amber);padding:.05rem .2rem;border-radius:2px}

    /* Placeholder */
    .preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:2rem}
    .preview-empty svg{width:48px;height:48px;margin-bottom:1rem;opacity:.3}
    .preview-empty p{font-size:.85rem}
    .preview-empty kbd{background:var(--surface2);border:1px solid var(--border);padding:.1rem .4rem;border-radius:3px;font-family:var(--mono);font-size:.72rem;margin:0 .1rem}

    /* Status bar */
    .statusbar{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:24px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    .status-item{font-size:.65rem;color:var(--text3);display:flex;align-items:center;gap:.3rem}
    .status-item .dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
    .status-left,.status-right{display:flex;gap:1rem}

    /* Toast */
    .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:100;border:1px solid var(--border)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Mobile */
    @media(max-width:768px){
      .editor-area{flex-direction:column}
      .divider{width:auto;height:1px;cursor:row-resize}
      .fmt-bar{overflow-x:auto;scrollbar-width:none}
      .fmt-bar::-webkit-scrollbar{display:none}
      .toolbar-nav{display:none}
      #editor,#preview{font-size:.82rem}
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <a class="toolbar-brand" href="../">
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"/></svg>
        Playground
      </a>
      <div class="toolbar-divider"></div>
      <div class="toolbar-nav">
        <a href="../">표준 문법</a>
        <a href="../extended/">변형 문법</a>
        <a href="../history/">역사</a>
        <a href="../ai-strategy/">국가AI전략위</a>
        <a href="../cheatsheet/">퀵시트</a>

      </div>
    </div>
    <div class="toolbar-right">
      <button class="tb-btn" onclick="loadTemplate()" title="예제 불러오기">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
        예제
      </button>
      <button class="tb-btn" onclick="clearEditor()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9z" clip-rule="evenodd"/></svg>

      </button>
      <button class="tb-btn" onclick="copyMarkdown()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
        MD 복사
      </button>
      <button class="tb-btn" onclick="copyHTML()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        HTML 복사
      </button>
      <button class="tb-btn" onclick="downloadMD()">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        .md
      </button>
    </div>
  </div>

  <!-- Format bar -->
  <div class="fmt-bar">
    <button class="fmt-btn" onclick="wrap('**','**')" title="굵게"><strong>B</strong></button>
    <button class="fmt-btn" onclick="wrap('*','*')" title="기울임" style="font-style:italic">I</button>
    <button class="fmt-btn" onclick="wrap('~~','~~')" title="취소선" style="text-decoration:line-through">S</button>
    <button class="fmt-btn" onclick="wrap('`','`')" title="인라인 코드" style="font-size:.7rem">&lt;/&gt;</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="insertLine('# ')" title="제목 1" style="font-size:.72rem">H1</button>
    <button class="fmt-btn" onclick="insertLine('## ')" title="제목 2" style="font-size:.72rem">H2</button>
    <button class="fmt-btn" onclick="insertLine('### ')" title="제목 3" style="font-size:.72rem">H3</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="insertLine('- ')" title="목록">&#x2022;</button>
    <button class="fmt-btn" onclick="insertLine('1. ')" title="순서 목록">1.</button>
    <button class="fmt-btn" onclick="insertLine('- [ ] ')" title="체크박스">&#x2610;</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" onclick="insertLine('> ')" title="인용">&#x201C;</button>
    <button class="fmt-btn" onclick="insertLine('---\n')" title="가로선">&#x2015;</button>
    <button class="fmt-btn" onclick="insertBlock('```\n','\n```')" title="코드 블록" style="font-size:.65rem">{ }</button>
    <button class="fmt-btn" onclick="insertLink()" title="링크">&#x1F517;</button>
    <button class="fmt-btn" onclick="insertImage()" title="이미지">&#x1F5BC;</button>
    <button class="fmt-btn" onclick="insertTable()" title="표">&#x25A6;</button>
  </div>

  <!-- Editor area -->
  <div class="editor-area">
    <!-- Input -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="dot" style="background:var(--green)"></span> MARKDOWN</span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="마크다운을 입력하세요...

# 제목을 써보세요

**굵은 텍스트**, *기울임*, ~~취소선~~

- 목록 항목
- [x] 체크박스

> 인용문

`인라인 코드`"></textarea>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Preview -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="dot" style="background:var(--primary)"></span> PREVIEW</span>
        <div class="panel-actions">
          <button class="panel-btn" onclick="toggleSync()" title="스크롤 동기화" id="sync-btn">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>
      <div id="preview"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="status-left">
      <span class="status-item"><span class="dot"></span>실시간 렌더링</span>
      <span class="status-item" id="stat-chars">0자</span>
      <span class="status-item" id="stat-words">0단어</span>
      <span class="status-item" id="stat-lines">0줄</span>

      <span class="status-item" id="stat-cursor">1:1</span>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
let syncScroll=true;

// === Markdown Parser (lightweight) ===
function parseMD(md){
  let html=md;

  // Escape HTML
  html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Code blocks (``` ... ```)
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>`<pre><code>${code}</code></pre>`);

  // Inline code
  html=html.replace(/`([^`\n]+)`/g,'<code>$1</code>');

  // Headers
  html=html.replace(/^######\s+(.+)$/gm,'<h6>$1</h6>');
  html=html.replace(/^#####\s+(.+)$/gm,'<h5>$1</h5>');
  html=html.replace(/^####\s+(.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^##\s+(.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^#\s+(.+)$/gm,'<h1>$1</h1>');

  // Horizontal rule
  html=html.replace(/^(---|\*\*\*|___)$/gm,'<hr>');

  // Bold + Italic
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');

  // Strikethrough
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');

  // Highlight
  html=html.replace(/==(.+?)==/g,'<mark>$1</mark>');

  // Images
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');

  // Links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

  // Autolinks
  html=html.replace(/(?<!["\(=])https?:\/\/[^\s<]+/g,'<a href="$&" target="_blank">$&</a>');

  // Blockquotes (multi-level)
  html=html.replace(/^&gt;\s?(.*)$/gm,(m,content)=>`<blockquote><p>${content}</p></blockquote>`);
  // Merge adjacent blockquotes
  html=html.replace(/<\/blockquote>\n<blockquote>/g,'\n');

  // Task lists
  html=html.replace(/^[-*]\s\[x\]\s+(.+)$/gm,'<li class="task"><input type="checkbox" checked disabled> $1</li>');
  html=html.replace(/^[-*]\s\[\s\]\s+(.+)$/gm,'<li class="task"><input type="checkbox" disabled> $1</li>');

  // Unordered lists
  html=html.replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>\n?)+/g,m=>{
    if(m.includes('class="task"'))return '<ul style="list-style:none;padding-left:.5rem">'+m+'</ul>';
    return '<ul>'+m+'</ul>';
  });

  // Ordered lists
  html=html.replace(/^\d+\.\s+(.+)$/gm,'<oli>$1</oli>');
  html=html.replace(/(<oli>.*<\/oli>\n?)+/g,m=>'<ol>'+m.replace(/oli>/g,'li>')+'</ol>');

  // Tables
  html=html.replace(/^(\|.+\|)\n(\|[-:|]+\|)\n((?:\|.+\|\n?)+)/gm,(m,header,align,body)=>{
    const aligns=align.split('|').filter(c=>c.trim()).map(c=>{
      c=c.trim();
      if(c.startsWith(':')&&c.endsWith(':'))return 'center';
      if(c.endsWith(':'))return 'right';
      return 'left';
    });
    const ths=header.split('|').filter(c=>c.trim()).map((c,i)=>`<th style="text-align:${aligns[i]||'left'}">${c.trim()}</th>`).join('');
    const rows=body.trim().split('\n').map(row=>{
      const tds=row.split('|').filter(c=>c.trim()).map((c,i)=>`<td style="text-align:${aligns[i]||'left'}">${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Paragraphs
  html=html.split('\n\n').map(block=>{
    block=block.trim();
    if(!block)return '';
    if(/^<[a-z]/.test(block))return block;
    if(block.startsWith('<'))return block;
    return block.split('\n').map(line=>{
      if(/^<[a-z]/.test(line))return line;
      return line;
    }).join('<br>');
  }).join('\n\n');

  // Wrap loose text in p tags
  html=html.replace(/^([^<\n].+)$/gm,line=>{
    if(/^</.test(line.trim()))return line;
    return `<p>${line}</p>`;
  });

  // Clean up
  html=html.replace(/<p><\/p>/g,'');
  html=html.replace(/<p>(<h[1-6]>)/g,'$1');
  html=html.replace(/(<\/h[1-6]>)<\/p>/g,'$1');
  html=html.replace(/<p>(<ul|<ol|<table|<blockquote|<hr|<pre)/g,'$1');
  html=html.replace(/(<\/ul>|<\/ol>|<\/table>|<\/blockquote>|<\/pre>)<\/p>/g,'$1');

  return html;
}

// === Render ===
function render(){
  const md=editor.value;
  if(!md.trim()){
    preview.innerHTML=`<div class="preview-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>왼쪽에 마크다운을 입력하면<br>여기에 결과가 나타납니다</p>
    </div>`;
  }else{
    preview.innerHTML=parseMD(md);
  }
  updateStats();
}

function updateStats(){
  const text=editor.value;
  document.getElementById('stat-chars').textContent=text.length+'자';
  document.getElementById('stat-words').textContent=(text.trim()?text.trim().split(/\s+/).length:0)+'단어';
  document.getElementById('stat-lines').textContent=text.split('\n').length+'줄';
}

function updateCursor(){
  const pos=editor.selectionStart;
  const lines=editor.value.substring(0,pos).split('\n');
  const line=lines.length;
  const col=lines[lines.length-1].length+1;
  document.getElementById('stat-cursor').textContent=line+':'+col;
}

// === Editor actions ===
function wrap(before,after){
  const start=editor.selectionStart;
  const end=editor.selectionEnd;
  const selected=editor.value.substring(start,end)||'텍스트';
  editor.setRangeText(before+selected+after,start,end,'select');
  editor.focus();
  render();
}

function insertLine(prefix){
  const start=editor.selectionStart;
  const before=editor.value.substring(0,start);
  const lineStart=before.lastIndexOf('\n')+1;
  const needNewline=lineStart<start&&before.substring(lineStart).trim()!=='';
  const insert=needNewline?'\n'+prefix:prefix;
  editor.setRangeText(insert,start,start,'end');
  editor.focus();
  render();
}

function insertBlock(before,after){
  const start=editor.selectionStart;
  const end=editor.selectionEnd;
  const selected=editor.value.substring(start,end)||'코드 입력';
  editor.setRangeText('\n'+before+selected+after+'\n',start,end,'end');
  editor.focus();
  render();
}

function insertLink(){
  const url=prompt('URL을 입력하세요:','https://');
  if(!url)return;
  const text=editor.value.substring(editor.selectionStart,editor.selectionEnd)||'링크 텍스트';
  wrap('[',`](${url})`);
}

function insertImage(){
  const url=prompt('이미지 URL을 입력하세요:','https://');
  if(!url)return;
  const start=editor.selectionStart;
  editor.setRangeText(`\n![이미지 설명](${url})\n`,start,start,'end');
  editor.focus();
  render();
}

function insertTable(){
  const table='\n| 열 1 | 열 2 | 열 3 |\n|------|------|------|\n| 값 1 | 값 2 | 값 3 |\n| 값 4 | 값 5 | 값 6 |\n';
  const start=editor.selectionStart;
  editor.setRangeText(table,start,start,'end');
  editor.focus();
  render();
}

// === Toolbar actions ===
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function copyMarkdown(){
  navigator.clipboard.writeText(editor.value).then(()=>showToast('마크다운이 클립보드에 복사되었습니다'));
}

function copyHTML(){
  navigator.clipboard.writeText(preview.innerHTML).then(()=>showToast('HTML이 클립보드에 복사되었습니다'));
}

function downloadMD(){
  const blob=new Blob([editor.value],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='document.md';
  a.click();
  showToast('document.md 다운로드 완료');
}

function clearEditor(){
  if(editor.value&&!confirm('내용을 모두 지울까요?'))return;
  editor.value='';
  render();
  localStorage.removeItem('md-playground');
}

function toggleSync(){

// === Events ===
editor.addEventListener('input',()=>{
  render();
  localStorage.setItem('md-playground',editor.value);
});
editor.addEventListener('keyup',updateCursor);
editor.addEventListener('click',updateCursor);

// Tab key support
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const start=editor.selectionStart;
    editor.setRangeText('  ',start,start,'end');
    render();
  }
});

// Scroll sync
editor.addEventListener('scroll',()=>{
  if(!syncScroll)return;
  const ratio=editor.scrollTop/(editor.scrollHeight-editor.clientHeight||1);
  preview.scrollTop=ratio*(preview.scrollHeight-preview.clientHeight);
});

// Resizable divider
const divider=document.getElementById('divider');
let isDragging=false;
divider.addEventListener('mousedown',()=>{isDragging=true;divider.classList.add('active')});
document.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const container=document.querySelector('.editor-area');
  const rect=container.getBoundingClientRect();
  const ratio=(e.clientX-rect.left)/rect.width*100;
  const panels=container.querySelectorAll('.panel');
  panels[0].style.flex=`0 0 ${Math.max(20,Math.min(80,ratio))}%`;
  panels[1].style.flex='1';
});
document.addEventListener('mouseup',()=>{isDragging=false;divider.classList.remove('active')});

// Init
const saved=localStorage.getItem('md-playground');
if(saved)editor.value=saved;
render();
updateCursor();
