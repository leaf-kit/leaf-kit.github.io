<!-- Company Links Popup -->
<div class="popup-overlay" id="company-popup">
  <div class="popup">
    <div class="popup-header">
      <h3 id="popup-company-name"></h3>

<footer class="footer">
  <p style="color:var(--c-text2);font-size:.78rem">리프취준랩 — 데이터 수집일 기준</p>
</footer>

<script src="../../assets/js/app.js"></script>
<script>
const FOLDER_ID = '2504021430';
let companyLinksData = [];

// Load company links data
async function loadCompanyLinks(){
  try{
    const res = await fetch(`../../data/${FOLDER_ID}/company_links.jsonl`);
    const text = await res.text();
    companyLinksData = text.trim().split('\n').map(line=>JSON.parse(line));
  }catch(e){ console.warn('company_links.jsonl not loaded:', e); }
}

function openPopup(companyName){
  const link = companyLinksData.find(c=>
    c.name === companyName ||
    c.name.includes(companyName) ||
    companyName.includes(c.name)
  );
  if(!link) return;

  document.getElementById('popup-company-name').textContent = link.name;
  const container = document.getElementById('popup-links');
  let html = `
    <div class="popup-link-group">
      <h4>🌐 대표 홈페이지</h4>
      <a href="${link.homepage}" target="_blank">${link.homepage}</a>
    </div>
    <div class="popup-link-group">
      <h4>💼 채용 페이지</h4>
      <a href="${link.recruit}" target="_blank">${link.recruit}</a>
    </div>
    <div class="popup-link-group">
      <h4>🚀 주요 서비스·제품</h4>
      <div class="service-grid">
  `;
  (link.services||[]).forEach(s=>{
    html += `<a href="${s.url}" target="_blank">${s.name}<small>${s.description||''}</small></a>`;
  });
  html += '</div></div>';
  container.innerHTML = html;
  document.getElementById('company-popup').classList.add('open');
}

function closePopup(){
  document.getElementById('company-popup').classList.remove('open');
}

document.getElementById('company-popup').addEventListener('click', e=>{
  if(e.target.id==='company-popup') closePopup();
});

// Override renderCompanyGrid to add popup button
const originalRenderCompanyGrid = renderCompanyGrid;
renderCompanyGrid = function(containerId, companies, folderId){
  const container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = '';
  companies.forEach(company=>{
    const card = document.createElement('div');
    card.className = 'company-card';
    const tags = (company.tech_keywords||[]).slice(0,5).map(k=>`<span class="tag" data-cat="Dev">${k}</span>`).join('');
    const newsHtml = (company.news||[]).map(n=>`<li><a href="${n.url}" target="_blank">${n.title}</a> <small>${n.date}</small></li>`).join('');
    const jobsHtml = (company.jobs_trend||[]).map(j=>`<span class="tag" data-cat="기획">${j}</span>`).join(' ');
    const mcap = company.market_cap_usd_B ? (company.market_cap_krw_T ? `시총 ${company.market_cap_krw_T}조원` : `시총 $${company.market_cap_usd_B}B`) : '';

    card.innerHTML = `
      <div class="company-card-header">
        <div class="company-rank">#${company.rank}</div>
        <div class="company-info">
          <div class="company-name">${company.name} ${company.ticker?'('+company.ticker+')':''}</div>
          <div class="company-meta">${company.ceo||''} · ${mcap}</div>
          <div class="company-tags">${tags}</div>
        </div>
        <span class="company-toggle">▼</span>
      </div>
      <div class="company-detail">
        <h4>전략 방향</h4>
        <p>${company.strategy||''}</p>
        ${company.recent_reorg?`<h4>최근 조직개편</h4><p>${company.recent_reorg}</p>`:''}
        <h4>관련 기업</h4>
        <p>${(company.related_companies||[]).join(', ')}</p>
        <h4>채용 트렌드</h4>
        <div>${jobsHtml}</div>
        ${newsHtml?`<h4>관련 기사</h4><ul>${newsHtml}</ul>`:''}
        <div class="data-links" style="margin-top:1rem">
          <a href="#" onclick="event.preventDefault();openPopup('${company.name.replace(/'/g,"\\'")}')">🔗 홈페이지·채용·서비스</a>
          <a href="../../data/${folderId}/global_top100.md">📄 .md</a>
          <a href="../../data/${folderId}/global_top100.json">📊 .json</a>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  initAccordion();
};

document.addEventListener('DOMContentLoaded', async ()=>{
  await loadCompanyLinks();
  loadDetailPage(FOLDER_ID);
});
</script>
