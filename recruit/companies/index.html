<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기업 정보 — 리프취준랩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .company-full{background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;box-shadow:var(--shadow);transition:border-color .2s}
    .company-full:hover{border-color:var(--c-primary)}
    .cf-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.4rem}
    .cf-name{font-size:1rem;font-weight:700;color:var(--c-text)}
    .cf-meta{font-size:.78rem;color:var(--c-text2);margin-top:.15rem}
    .cf-body{margin-top:.6rem}
    .cf-row{display:flex;gap:.75rem;flex-wrap:wrap;margin:.35rem 0;align-items:flex-start}
    .cf-row .label{font-size:.75rem;font-weight:600;color:var(--c-primary);min-width:70px;flex-shrink:0}
    .cf-links{display:flex;gap:.4rem;margin-top:.75rem;flex-wrap:wrap}
    .cf-links a{font-size:.8rem;padding:.35rem .7rem;border:1px solid var(--c-border);border-radius:5px;color:var(--c-text2);font-weight:500;transition:all .15s}
    .cf-links a:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}
    .cf-links a.hire{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}
    .cf-links a.hire:hover{opacity:.9}
    .services-row{display:flex;flex-wrap:wrap;gap:.2rem}
    .services-row .svc{font-size:.72rem;padding:.15rem .4rem;background:var(--c-surface);border:1px solid var(--c-border);border-radius:3px;color:var(--c-text2)}
    .services-row .svc:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}
    .section-label{font-size:.95rem;font-weight:700;color:var(--c-text);margin:1.5rem 0 .5rem;padding-bottom:.35rem;border-bottom:2px solid var(--c-primary)}
    /* Tech popup */
    .tech-popup-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.2);z-index:199;display:none}
    .tech-popup-backdrop.open{display:block}
    .tech-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);background:#fff;border:1px solid var(--c-border);border-radius:12px;width:90%;max-width:440px;max-height:80vh;overflow-y:auto;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.15);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
    .tech-popup.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
    .tp-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--c-text2)}
    .tp-title{font-size:1.1rem;font-weight:700}
    .tp-cat{font-size:.68rem;padding:.1rem .35rem;border-radius:3px;color:#fff;font-weight:600;display:inline-block;margin:.2rem 0 .6rem}
    .tp-section{margin-top:.75rem}
    .tp-section h4{font-size:.75rem;font-weight:600;color:var(--c-primary);margin-bottom:.3rem}
    .tp-desc{font-size:.82rem;line-height:1.5;color:var(--c-text2)}
    .tp-companies{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.3rem}
    .tp-company{font-size:.7rem;padding:.12rem .35rem;border:1px solid var(--c-border);border-radius:3px}
    .tp-link{display:inline-block;margin-top:.75rem;font-size:.8rem;padding:.35rem .7rem;background:var(--c-primary);color:#fff;border-radius:5px;text-decoration:none;font-weight:500}
    .tp-link:hover{opacity:.9;text-decoration:none}
    .clickable-tag{cursor:pointer;transition:transform .1s}
    .clickable-tag:hover{transform:scale(1.05)}
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="../">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 2C7 7 4 12 5 17c1 2 3 4 7 5 4-1 6-3 7-5 1-5-2-10-7-15z" stroke="#22C55E" stroke-width="1.5" fill="#22C55E" fill-opacity=".1"/><path d="M12 6v16" stroke="#22C55E" stroke-width=".8" opacity=".5"/></svg>
    리프취준랩
  </a>
  <div class="nav-actions">
    <a href="../">채용 트렌드</a>
    <a href="../graph/">그래프 분석</a>
    <a href="../roles/">직군 상세</a>
    <a href="./" class="active">기업 정보</a>
    <a href="../about/">소개</a>
  </div>
</nav>

<section class="hero">
  <h1>기업별 채용 정보</h1>
  <p class="subtitle">홈페이지, 채용 페이지, 주요 서비스, 채용 키워드를 한눈에</p>
</section>

<main class="container">
  <div class="search-bar">
    <input type="text" id="company-search" placeholder="기업명 검색...">
  </div>

  <div class="section-label">글로벌 기업</div>
  <div id="global-list"></div>

  <div class="section-label">국내 기업</div>
  <div id="korea-list"></div>
</main>

<!-- Tech Tag Popup -->
<div class="tech-popup-backdrop" id="tech-popup-backdrop" onclick="closeTechPopup()"></div>
<div class="tech-popup" id="tech-popup">
  <div class="tech-popup-inner" id="tech-popup-content"></div>
</div>

<footer class="footer">
  <p style="color:var(--c-text2);font-size:.78rem">리프취준랩 — 데이터 수집일 기준</p>
</footer>

<script src="../../assets/js/app.js"></script>
<script>
async function load(){
  const indexRes = await fetch('../../data/index.json');
  const indexData = await indexRes.json();
  const folderId = indexData.collections[0].folder_id;
  const basePath = `../../data/${folderId}/`;

  const [globalCo, koreaCo, linksText] = await Promise.all([
    fetch(basePath+'global_top100.json').then(r=>r.json()),
    fetch(basePath+'korea_top100.json').then(r=>r.json()),
    fetch(basePath+'company_links.jsonl').then(r=>r.text())
  ]);
  const links = linksText.trim().split('\n').map(l=>JSON.parse(l));

  renderList('global-list', globalCo, links);
  renderList('korea-list', koreaCo, links);

  document.getElementById('company-search').addEventListener('input', e=>{
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.company-full').forEach(card=>{
      card.style.display = (!q||card.getAttribute('data-name').includes(q)) ? '' : 'none';
    });
  });
}

function renderList(containerId, companies, links){
  const container = document.getElementById(containerId);
  companies.forEach(co=>{
    const link = links.find(l=>l.name===co.name||l.name.includes(co.name)||co.name.includes(l.name));
    const services = (link?.services||[]).map(s=>
      `<a class="svc" href="${s.url}" target="_blank" title="${s.description||''}">${s.name}</a>`
    ).join('');
    const jobTags = (co.jobs_trend||[]).map(j=>`<span class="tag" data-cat="기획" style="font-size:.68rem;padding:.08rem .3rem">${j}</span>`).join(' ');
    const techTags = (co.tech_keywords||[]).slice(0,6).map(k=>`<span class="tag" data-cat="Dev" style="font-size:.68rem;padding:.08rem .3rem">${k}</span>`).join(' ');

    const card = document.createElement('div');
    card.className = 'company-full';
    card.setAttribute('data-name', co.name.toLowerCase());
    card.innerHTML = `
      <div class="cf-header">
        <div>
          <div class="cf-name">#${co.rank} ${co.name} ${co.ticker?'('+co.ticker+')':''}</div>
          <div class="cf-meta">${co.ceo||''} · ${co.hq||''} · ${co.market_cap_usd_B?'$'+co.market_cap_usd_B+'B':''}${co.market_cap_krw_T?co.market_cap_krw_T+'조원':''}</div>
        </div>
      </div>
      <div class="cf-body">
        <div class="cf-row"><span class="label">기술 스택</span><div>${techTags||'-'}</div></div>
        <div class="cf-row"><span class="label">채용 직군</span><div>${jobTags||'-'}</div></div>
        <div class="cf-row"><span class="label">전략</span><div style="font-size:.82rem;color:var(--c-text2)">${co.strategy||'-'}</div></div>
        ${services?`<div class="cf-row"><span class="label">서비스</span><div class="services-row">${services}</div></div>`:''}
      </div>
      <div class="cf-links">
        <a class="hire" href="${link?.recruit||'#'}" target="_blank">채용 페이지</a>
        <a href="${link?.homepage||'#'}" target="_blank">홈페이지</a>
        <a href="https://www.saramin.co.kr/zf_user/search?searchword=${encodeURIComponent(co.name)}" target="_blank" style="color:#0066FF;font-weight:600">사람인</a>
        <a href="https://www.jobkorea.co.kr/Search/?stext=${encodeURIComponent(co.name)}" target="_blank" style="color:#00A13A;font-weight:600">잡코리아</a>
        <a href="https://www.jobplanet.co.kr/search?query=${encodeURIComponent(co.name)}" target="_blank" style="color:#00C362;font-weight:600">잡플래닛</a>
      </div>`;
    container.appendChild(card);
  });
}

let graphData = null;
async function loadGraphData(){
  try{
    const ir = await fetch('../../data/index.json');
    const idx = await ir.json();
    const r = await fetch(`../../data/${idx.collections[0].folder_id}/graph_data.json`);
    graphData = await r.json();
  }catch(e){}
}
function openTechPopup(name){
  if(!graphData) return;
  const node = graphData.nodes.find(n=>n.type==='tech'&&(n.label===name||n.label.toLowerCase()===name.toLowerCase()));
  if(!node) return;
  const desc = graphData.tech_descriptions?.[node.id]||{};
  const catCol = {frontend:'#F59E0B',backend:'#10B981',ai:'#8B5CF6',infra:'#EF4444',data:'#06B6D4',language:'#84CC16',mobile:'#F97316',design:'#EC4899'};
  const companies = graphData.edges.filter(e=>e.type==='uses'&&e.target===node.id).map(e=>graphData.nodes.find(n=>n.id===e.source)?.label).filter(Boolean);
  const roles = graphData.edges.filter(e=>e.type==='requires'&&e.target===node.id).map(e=>graphData.nodes.find(n=>n.id===e.source)?.label).filter(Boolean);
  document.getElementById('tech-popup-content').innerHTML = `
    <button class="tp-close" onclick="closeTechPopup()">&times;</button>
    <div class="tp-title">${node.label}</div>
    <span class="tp-cat" style="background:${catCol[node.category]||'#6366F1'}">${node.category}</span>
    <div class="tp-section"><h4>이 기술은?</h4><p class="tp-desc">${desc.description||''}</p></div>
    ${desc.useCase?`<div class="tp-section"><h4>활용 분야</h4><p class="tp-desc">${desc.useCase}</p></div>`:''}
    <div class="tp-section"><h4>수요</h4><p class="tp-desc">점수 <strong>${node.demand}</strong>/100 · 트렌드 <strong style="color:#10B981">${node.trend}</strong>${desc.avgSalaryRange?' · 연봉 <strong>'+desc.avgSalaryRange+'</strong>':''}</p></div>
    ${roles.length?`<div class="tp-section"><h4>필요한 직군</h4><div class="tp-companies">${roles.map(r=>`<span class="tp-company">${r}</span>`).join('')}</div></div>`:''}
    <div class="tp-section"><h4>채용 중인 기업 (${companies.length})</h4><div class="tp-companies">${companies.map(c=>`<span class="tp-company">${c}</span>`).join('')}</div></div>
    <div class="tp-section"><h4>채용 사이트에서 검색</h4><div style="display:flex;gap:.3rem;margin-top:.25rem">
      <a href="https://www.saramin.co.kr/zf_user/search?searchword=${encodeURIComponent(node.label)}" target="_blank" style="font-size:.75rem;padding:.25rem .5rem;border:1px solid var(--c-border);border-radius:4px;color:var(--c-text2);text-decoration:none"><span style="font-weight:600;color:#0066FF">사람인</span> ↗</a>
      <a href="https://www.jobkorea.co.kr/Search/?stext=${encodeURIComponent(node.label)}" target="_blank" style="font-size:.75rem;padding:.25rem .5rem;border:1px solid var(--c-border);border-radius:4px;color:var(--c-text2);text-decoration:none"><span style="font-weight:600;color:#00A13A">잡코리아</span> ↗</a>
    </div></div>
    <a href="../graph/" class="tp-link">그래프에서 통찰 보기 &rarr;</a>`;
  document.getElementById('tech-popup').classList.add('open');
  document.getElementById('tech-popup-backdrop').classList.add('open');
}
function closeTechPopup(){
  document.getElementById('tech-popup').classList.remove('open');
  document.getElementById('tech-popup-backdrop').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', async ()=>{
  await loadGraphData();
  await load();
  setTimeout(()=>{
    document.querySelectorAll('.tag[data-cat="Dev"]').forEach(tag=>{
      tag.classList.add('clickable-tag');
      tag.addEventListener('click', e=>{e.stopPropagation(); openTechPopup(tag.textContent.trim());});
    });
  }, 300);
});
</script>
</body>
</html>
