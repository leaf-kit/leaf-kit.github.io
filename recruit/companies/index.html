<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기업 정보 — 리프취준랩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .company-full{background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem;box-shadow:var(--shadow);transition:border-color .2s}
    .company-full:hover{border-color:var(--c-primary)}
    .cf-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.4rem}
    .cf-name{font-size:1rem;font-weight:700;color:var(--c-text)}
    .cf-meta{font-size:.78rem;color:var(--c-text2);margin-top:.15rem}
    .cf-body{margin-top:.6rem}
    .cf-row{display:flex;gap:.75rem;flex-wrap:wrap;margin:.35rem 0;align-items:flex-start}
    .cf-row .label{font-size:.75rem;font-weight:600;color:var(--c-primary);min-width:70px;flex-shrink:0}
    .cf-links{display:flex;gap:.4rem;margin-top:.75rem;flex-wrap:wrap}
    .cf-links a{font-size:.8rem;padding:.35rem .7rem;border:1px solid var(--c-border);border-radius:5px;color:var(--c-text2);font-weight:500;transition:all .15s}
    .cf-links a:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}
    .cf-links a.hire{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}
    .cf-links a.hire:hover{opacity:.9}
    .services-row{display:flex;flex-wrap:wrap;gap:.2rem}
    .services-row .svc{font-size:.72rem;padding:.15rem .4rem;background:var(--c-surface);border:1px solid var(--c-border);border-radius:3px;color:var(--c-text2)}
    .services-row .svc:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}
    .section-label{font-size:.95rem;font-weight:700;color:var(--c-text);margin:1.5rem 0 .5rem;padding-bottom:.35rem;border-bottom:2px solid var(--c-primary)}
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="../">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 2C7 7 4 12 5 17c1 2 3 4 7 5 4-1 6-3 7-5 1-5-2-10-7-15z" stroke="#22C55E" stroke-width="1.5" fill="#22C55E" fill-opacity=".1"/><path d="M12 6v16" stroke="#22C55E" stroke-width=".8" opacity=".5"/></svg>
    리프취준랩
  </a>
  <div class="nav-actions">
    <a href="../">채용 트렌드</a>
    <a href="../roles/">직군 상세</a>
    <a href="./" class="active">기업 정보</a>
  </div>
</nav>

<section class="hero">
  <h1>기업별 채용 정보</h1>
  <p class="subtitle">홈페이지, 채용 페이지, 주요 서비스, 채용 키워드를 한눈에</p>
</section>

<main class="container">
  <div class="search-bar">
    <input type="text" id="company-search" placeholder="기업명 검색...">
  </div>

  <div class="section-label">글로벌 기업</div>
  <div id="global-list"></div>

  <div class="section-label">국내 기업</div>
  <div id="korea-list"></div>
</main>

<footer class="footer">
  <p style="color:var(--c-text2);font-size:.78rem">리프취준랩 — 데이터 수집일 기준</p>
</footer>

<script src="../../assets/js/app.js"></script>
<script>
async function load(){
  const indexRes = await fetch('../../data/index.json');
  const indexData = await indexRes.json();
  const folderId = indexData.collections[0].folder_id;
  const basePath = `../../data/${folderId}/`;

  const [globalCo, koreaCo, linksText] = await Promise.all([
    fetch(basePath+'global_top100.json').then(r=>r.json()),
    fetch(basePath+'korea_top100.json').then(r=>r.json()),
    fetch(basePath+'company_links.jsonl').then(r=>r.text())
  ]);
  const links = linksText.trim().split('\n').map(l=>JSON.parse(l));

  renderList('global-list', globalCo, links);
  renderList('korea-list', koreaCo, links);

  document.getElementById('company-search').addEventListener('input', e=>{
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.company-full').forEach(card=>{
      card.style.display = (!q||card.getAttribute('data-name').includes(q)) ? '' : 'none';
    });
  });
}

function renderList(containerId, companies, links){
  const container = document.getElementById(containerId);
  companies.forEach(co=>{
    const link = links.find(l=>l.name===co.name||l.name.includes(co.name)||co.name.includes(l.name));
    const services = (link?.services||[]).map(s=>
      `<a class="svc" href="${s.url}" target="_blank" title="${s.description||''}">${s.name}</a>`
    ).join('');
    const jobTags = (co.jobs_trend||[]).map(j=>`<span class="tag" data-cat="기획" style="font-size:.68rem;padding:.08rem .3rem">${j}</span>`).join(' ');
    const techTags = (co.tech_keywords||[]).slice(0,6).map(k=>`<span class="tag" data-cat="Dev" style="font-size:.68rem;padding:.08rem .3rem">${k}</span>`).join(' ');

    const card = document.createElement('div');
    card.className = 'company-full';
    card.setAttribute('data-name', co.name.toLowerCase());
    card.innerHTML = `
      <div class="cf-header">
        <div>
          <div class="cf-name">#${co.rank} ${co.name} ${co.ticker?'('+co.ticker+')':''}</div>
          <div class="cf-meta">${co.ceo||''} · ${co.hq||''} · ${co.market_cap_usd_B?'$'+co.market_cap_usd_B+'B':''}${co.market_cap_krw_T?co.market_cap_krw_T+'조원':''}</div>
        </div>
      </div>
      <div class="cf-body">
        <div class="cf-row"><span class="label">기술 스택</span><div>${techTags||'-'}</div></div>
        <div class="cf-row"><span class="label">채용 직군</span><div>${jobTags||'-'}</div></div>
        <div class="cf-row"><span class="label">전략</span><div style="font-size:.82rem;color:var(--c-text2)">${co.strategy||'-'}</div></div>
        ${services?`<div class="cf-row"><span class="label">서비스</span><div class="services-row">${services}</div></div>`:''}
      </div>
      <div class="cf-links">
        <a class="hire" href="${link?.recruit||'#'}" target="_blank">채용 페이지</a>
        <a href="${link?.homepage||'#'}" target="_blank">홈페이지</a>
      </div>`;
    container.appendChild(card);
  });
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
