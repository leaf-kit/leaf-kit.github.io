<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리프취준랩 — IT 채용 트렌드 한눈에</title>
  <meta name="description" content="리프취준랩 — 직군별 채용 수요, 기업별 채용 페이지, 핵심 스킬을 일목요연하게 정리합니다.">
  <meta property="og:title" content="리프취준랩 | IT 채용 트렌드 한눈에">
  <meta property="og:description" content="직군별 수요, 기업별 채용 링크, 핵심 스킬 — 취준생을 위한 원스톱 페이지">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* Recruit-specific overrides */
    .recruit-hero{
      background:#fff;
      border-bottom:1px solid var(--c-border);
      padding:2.5rem 2rem 2rem;
      text-align:center;
    }
    .recruit-hero h1{font-size:1.5rem;font-weight:800;color:var(--c-text)}
    .recruit-hero .desc{color:var(--c-text2);font-size:.88rem;margin-top:.35rem;font-weight:400}

    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin:1.5rem 0}
    .stat-card{
      background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);
      padding:1rem;text-align:center;box-shadow:var(--shadow);
    }
    .stat-card .num{font-size:1.8rem;font-weight:800;color:var(--c-primary)}
    .stat-card .label{font-size:.72rem;color:var(--c-text2);margin-top:.15rem;font-weight:500}
    .stat-card .icon{font-size:1.2rem;margin-bottom:.25rem;display:block}

    .role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.75rem;margin:1rem 0}
    .role-card{
      background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);
      padding:1rem;box-shadow:var(--shadow);transition:box-shadow .2s;
    }
    .role-card:hover{box-shadow:var(--shadow-md)}
    .role-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem}
    .role-card-title{font-weight:700;font-size:.95rem;color:var(--c-text)}
    .role-demand{font-size:.8rem;font-weight:500}
    .role-stats{display:flex;gap:1.25rem;margin:.35rem 0;font-size:.8rem;color:var(--c-text2)}
    .role-stats strong{color:var(--c-text)}
    .role-skills{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.5rem}
    .role-category-badge{font-size:.65rem;padding:.12rem .4rem;border-radius:3px;font-weight:600;color:#fff;letter-spacing:.01em}

    .company-recruit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem;margin:1rem 0}
    .company-recruit-card{
      background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);
      padding:.9rem;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:.35rem;
      transition:border-color .2s;
    }
    .company-recruit-card:hover{border-color:var(--c-primary)}
    .cr-name{font-weight:700;font-size:.9rem;color:var(--c-text)}
    .cr-meta{font-size:.75rem;color:var(--c-text2)}
    .cr-jobs{display:flex;flex-wrap:wrap;gap:.2rem;margin:.2rem 0}
    .cr-links{display:flex;gap:.4rem;margin-top:auto;padding-top:.5rem;border-top:1px solid var(--c-border)}
    .cr-links a{
      font-size:.78rem;padding:.3rem .5rem;border:1px solid var(--c-border);
      border-radius:5px;flex:1;text-align:center;color:var(--c-text2);
      font-weight:500;transition:all .15s;
    }
    .cr-links a:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}
    .cr-links a.primary{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}
    .cr-links a.primary:hover{opacity:.9}

    .skill-ranking{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem;margin:1rem 0}
    .skill-item{
      display:flex;align-items:center;gap:.6rem;
      background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);
      padding:.6rem .8rem;
    }
    .skill-rank{font-size:1.1rem;font-weight:800;color:var(--c-primary);min-width:1.3rem;text-align:right}
    .skill-name{font-weight:600;font-size:.85rem}
    .skill-count{font-size:.75rem;color:var(--c-text2);margin-left:auto}
    .skill-bar{height:3px;background:var(--c-border);border-radius:2px;margin-top:.2rem}
    .skill-bar-fill{height:100%;background:var(--c-primary);border-radius:2px;transition:width .5s}

    .quick-nav{display:flex;gap:.4rem;flex-wrap:wrap;margin:1rem 0;justify-content:center}
    .quick-nav a{
      padding:.4rem .8rem;border:1px solid var(--c-border);border-radius:5px;
      font-size:.8rem;font-weight:500;color:var(--c-text2);background:#fff;
    }
    .quick-nav a:hover{border-color:var(--c-primary);color:var(--c-primary);text-decoration:none}

    .section-divider{border:none;border-top:1px solid var(--c-border);margin:2rem 0}

    @media(max-width:768px){
      .role-grid{grid-template-columns:1fr}
      .company-recruit-grid{grid-template-columns:1fr}
      .stat-row{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="nav-brand" href="./">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 2C7 7 4 12 5 17c1 2 3 4 7 5 4-1 6-3 7-5 1-5-2-10-7-15z" stroke="#22C55E" stroke-width="1.5" fill="#22C55E" fill-opacity=".1"/><path d="M12 6v16" stroke="#22C55E" stroke-width=".8" opacity=".5"/></svg>
    리프취준랩
  </a>
  <div class="nav-actions">
    <a href="./" class="active">채용 트렌드</a>
    <a href="graph/">그래프 분석</a>
    <a href="roles/">직군 상세</a>
    <a href="companies/">기업 정보</a>
    <a href="about/">소개</a>
  </div>
</nav>

<!-- Hero -->
<section class="recruit-hero">
  <h1>리프취준랩</h1>
  <p class="desc">IT 직군별 채용 수요, 기업별 채용 페이지, 핵심 스킬을 한 페이지에서 확인하세요</p>
  <div class="live-badge" style="margin-top:.75rem">
    <span class="live-dot"></span>
    <span id="live-info">데이터 로딩중...</span>
  </div>
</section>

<main class="container">

  <!-- Quick Nav -->
  <div class="quick-nav">
    <a href="#roles">직군별 트렌드</a>
    <a href="#skills">핵심 스킬 랭킹</a>
    <a href="#companies-global">글로벌 채용</a>
    <a href="#companies-korea">국내 채용</a>
    <a href="roles/">직군 상세 보기</a>
    <a href="companies/">기업 상세 보기</a>
  </div>

  <!-- Stats -->
  <div class="stat-row" id="stat-row"></div>

  <hr class="section-divider">

  <!-- 직군별 채용 트렌드 -->
  <div class="section-title" id="roles">직군별 채용 트렌드</div>
  <p style="color:var(--c-text2);font-size:.82rem;margin-bottom:.75rem">최신 수집 데이터 기준 채용 공고 수와 전 회차 대비 변동량</p>

  <div class="search-bar" style="margin-bottom:.75rem">
    <input type="text" id="role-search" placeholder="직군명, 스킬 검색...">
  </div>

  <div class="role-grid" id="role-grid"></div>

  <hr class="section-divider">

  <!-- 핵심 스킬 랭킹 -->
  <div class="section-title" id="skills">가장 많이 요구되는 스킬 TOP 15</div>
  <div class="skill-ranking" id="skill-ranking"></div>

  <hr class="section-divider">

  <!-- 글로벌 기업 채용 -->
  <div class="section-title" id="companies-global">글로벌 기업 채용</div>
  <div class="company-recruit-grid" id="global-recruit"></div>

  <hr class="section-divider">

  <!-- 국내 기업 채용 -->
  <div class="section-title" id="companies-korea">국내 기업 채용</div>
  <div class="company-recruit-grid" id="korea-recruit"></div>

</main>

<footer class="footer">
  <p style="color:var(--c-text2);font-size:.78rem">리프취준랩 — 데이터 수집일 기준</p>
</footer>

<script src="../assets/js/app.js"></script>
<script>
const catColors = {'AI/ML':'#7C3AED', Development:'#2563EB', 'Design/기획':'#EC4899', Data:'#10B981', Infrastructure:'#6366F1'};

async function loadRecruit(){
  const indexRes = await fetch('../data/index.json');
  const indexData = await indexRes.json();
  const latest = indexData.collections[0];
  const folderId = latest.folder_id;
  const basePath = `../data/${folderId}/`;

  document.getElementById('live-info').textContent =
    `${latest.label} 기준 · 총 ${indexData.total_collections}회차 누적`;

  const [jobs, companyLinks, globalCo, koreaCo] = await Promise.all([
    fetch(basePath+'jobs_trend.json').then(r=>r.json()),
    fetch(basePath+'company_links.jsonl').then(r=>r.text()).then(t=>t.trim().split('\n').map(l=>JSON.parse(l))),
    fetch(basePath+'global_top100.json').then(r=>r.json()),
    fetch(basePath+'korea_top100.json').then(r=>r.json())
  ]);

  renderStats(jobs, companyLinks);
  renderRoles(jobs);
  renderSkillRanking(jobs);
  renderCompanyRecruit('global-recruit', globalCo, companyLinks);
  renderCompanyRecruit('korea-recruit', koreaCo, companyLinks);
  initRoleSearch();
}

function renderStats(jobs, links){
  const totalRoles = jobs.categories.reduce((s,c)=>s+c.roles.length, 0);
  const totalPostings = jobs.categories.reduce((s,c)=>s+c.roles.reduce((ss,r)=>ss+r.count,0), 0);
  const hotRoles = jobs.categories.reduce((s,c)=>s+c.roles.filter(r=>r.demand.includes('급상승')).length, 0);

  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="num">${totalRoles}</div><div class="label">추적 직군</div></div>
    <div class="stat-card"><div class="num">${totalPostings.toLocaleString()}</div><div class="label">채용 공고</div></div>
    <div class="stat-card"><div class="num">${hotRoles}</div><div class="label">급상승 직군</div></div>
    <div class="stat-card"><div class="num">${links.length}</div><div class="label">기업 채용 링크</div></div>
  `;
}

function renderRoles(jobs){
  const grid = document.getElementById('role-grid');
  grid.innerHTML = '';
  jobs.categories.forEach(cat=>{
    const color = catColors[cat.name]||'#6366F1';
    cat.roles.forEach(role=>{
      const sign = role.delta>0?'+':'';
      const deltaColor = role.delta>0?'color:var(--c-green)':'color:var(--c-red)';
      const card = document.createElement('div');
      card.className = 'role-card';
      card.setAttribute('data-search', `${role.title} ${role.skills.join(' ')} ${cat.name}`.toLowerCase());
      card.innerHTML = `
        <div class="role-card-header">
          <span class="role-card-title">${role.title}</span>
          <span class="role-category-badge" style="background:${color}">${cat.name}</span>
        </div>
        <div style="font-size:.82rem;color:var(--c-text2)">${role.demand}</div>
        <div class="role-stats">
          <span>공고 <strong>${role.count}</strong>건</span>
          <span style="${deltaColor}">전 회차 대비 <strong>${sign}${role.delta}</strong></span>
        </div>
        <div class="role-skills">
          ${role.skills.map(s=>`<span class="tag" data-cat="Dev">${s}</span>`).join('')}
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function renderSkillRanking(jobs){
  const skillMap = new Map();
  jobs.categories.forEach(cat=>{
    cat.roles.forEach(role=>{
      role.skills.forEach(s=>{ skillMap.set(s, (skillMap.get(s)||0)+role.count); });
    });
  });
  const sorted = [...skillMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,15);
  const max = sorted[0]?.[1]||1;
  const container = document.getElementById('skill-ranking');
  container.innerHTML = '';
  sorted.forEach(([name,count],i)=>{
    const pct = Math.round(count/max*100);
    container.innerHTML += `
      <div class="skill-item">
        <span class="skill-rank">${i+1}</span>
        <div style="flex:1">
          <div class="skill-name">${name}</div>
          <div class="skill-bar"><div class="skill-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <span class="skill-count">${count.toLocaleString()}</span>
      </div>`;
  });
}

function renderCompanyRecruit(containerId, companies, companyLinks){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  companies.forEach(co=>{
    const link = companyLinks.find(l=>l.name===co.name||l.name.includes(co.name)||co.name.includes(l.name));
    const recruitUrl = link?.recruit||'#';
    const homepageUrl = link?.homepage||'#';
    const jobTags = (co.jobs_trend||[]).slice(0,4).map(j=>`<span class="tag" data-cat="기획" style="font-size:.65rem;padding:.1rem .3rem">${j}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'company-recruit-card';
    card.innerHTML = `
      <div class="cr-name">${co.name} ${co.ticker?'<span style="color:var(--c-text2);font-weight:400;font-size:.75rem">('+co.ticker+')</span>':''}</div>
      <div class="cr-meta">${co.ceo||''} · ${co.hq||''}</div>
      <div class="cr-jobs">${jobTags||'<span style="font-size:.75rem;color:var(--c-text2)">-</span>'}</div>
      <div class="cr-links">
        <a class="primary" href="${recruitUrl}" target="_blank">채용 페이지</a>
        <a href="${homepageUrl}" target="_blank">홈페이지</a>
      </div>`;
    container.appendChild(card);
  });
}

function initRoleSearch(){
  const input = document.getElementById('role-search');
  input.addEventListener('input', ()=>{
    const q = input.value.toLowerCase().trim();
    document.querySelectorAll('.role-card').forEach(card=>{
      card.style.display = (!q||card.getAttribute('data-search').includes(q)) ? '' : 'none';
    });
  });
}

document.addEventListener('DOMContentLoaded', loadRecruit);
</script>
</body>
</html>
