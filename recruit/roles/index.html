<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직군 상세 — 리프취준랩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .role-detail{background:#fff;border:1px solid var(--c-border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
    .role-detail:hover{box-shadow:var(--shadow-md)}
    .role-detail h2{font-size:1.05rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
    .role-detail h2 .badge{font-size:.65rem;padding:.12rem .4rem;border-radius:3px;color:#fff;font-weight:600}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:.5rem 0}
    .detail-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:.9rem}
    .detail-box h4{font-size:.78rem;font-weight:600;color:var(--c-primary);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.02em}
    .demand-indicator{display:inline-flex;align-items:center;gap:.25rem;font-size:.82rem;font-weight:600;padding:.25rem .6rem;border-radius:4px;background:var(--c-surface);border:1px solid var(--c-border)}
    @media(max-width:768px){.detail-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="../">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 2C7 7 4 12 5 17c1 2 3 4 7 5 4-1 6-3 7-5 1-5-2-10-7-15z" stroke="#22C55E" stroke-width="1.5" fill="#22C55E" fill-opacity=".1"/><path d="M12 6v16" stroke="#22C55E" stroke-width=".8" opacity=".5"/></svg>
    리프취준랩
  </a>
  <div class="nav-actions">
    <a href="../">채용 트렌드</a>
    <a href="./" class="active">직군 상세</a>
    <a href="../companies/">기업 정보</a>
  </div>
</nav>

<section class="hero">
  <h1>직군별 상세 정보</h1>
  <p class="subtitle">각 직군의 수요 현황, 필수 스킬, 추천 학습 경로</p>
</section>

<main class="container" id="roles-container"></main>

<footer class="footer">
  <p style="color:var(--c-text2);font-size:.78rem">리프취준랩 — 데이터 수집일 기준</p>
</footer>

<script src="../../assets/js/app.js"></script>
<script>
const catColors = {'AI/ML':'#7C3AED', Development:'#2563EB', 'Design/기획':'#EC4899', Data:'#10B981', Infrastructure:'#6366F1'};

const learningPaths = {
  'AI Engineer': ['Python 심화','PyTorch/TensorFlow','LLM 파인튜닝','RAG 구현','MLOps 기초'],
  'MLOps Engineer': ['Docker/Kubernetes','CI/CD 파이프라인','MLflow/Kubeflow','AWS SageMaker','모니터링'],
  'Prompt Engineer': ['LLM 아키텍처 이해','프롬프트 패턴','평가 메트릭','RAG 설계','API 활용'],
  'Data Scientist': ['통계학 기초','Python/R','SQL 심화','ML 알고리즘','시각화'],
  'Computer Vision Engineer': ['OpenCV','CNN/YOLO','이미지 처리','3D Vision','Edge Deployment'],
  'NLP Engineer': ['Transformer','Hugging Face','텍스트 전처리','LLM','한국어 NLP'],
  'AI Researcher': ['논문 읽기','수학(선형대수/확률)','실험 설계','PyTorch','최신 아키텍처'],
  'Robotics Engineer': ['ROS','C++','센서 융합','제어 이론','시뮬레이션'],
  'Backend Engineer': ['Java/Go/Node.js','DB 설계','API 설계','캐싱 전략','대용량 처리'],
  'Frontend Engineer': ['React/Vue/Next.js','TypeScript','상태관리','성능 최적화','접근성'],
  'DevOps Engineer': ['AWS/GCP/Azure','Terraform/IaC','Kubernetes','CI/CD','보안'],
  'Full-Stack Engineer': ['프론트+백 기초','DB 설계','배포 자동화','API 설계','클라우드'],
  'Security Engineer': ['네트워크 보안','OWASP','침투 테스트','보안 아키텍처','컴플라이언스'],
  'SRE': ['인프라 모니터링','SLO/SLI','인시던트 관리','Kubernetes','자동화'],
  'Mobile Developer': ['Swift/Kotlin','React Native/Flutter','앱 아키텍처','CI/CD','성능 최적화'],
  'Blockchain Developer': ['Solidity','Web3.js','스마트 컨트랙트','DeFi','보안 감사'],
  'Embedded Engineer': ['C/C++','RTOS','MCU','통신 프로토콜','하드웨어 디버깅'],
  'Product Manager': ['사용자 리서치','데이터 분석','애자일/스크럼','기술 이해','커뮤니케이션'],
  'UX Designer': ['사용자 리서치','Figma','프로토타이핑','디자인 시스템','A/B 테스트'],
  'Product Designer': ['UI/UX 기초','Figma 심화','디자인 시스템','UX Writing','데이터 기반 설계'],
  'Data Analyst': ['SQL','Python/R','시각화(Tableau)','통계 분석','비즈니스 이해'],
  'Technical Writer': ['기술 문서 작성','API 문서화','다이어그램','Git','마크다운'],
  'Growth Hacker': ['데이터 분석','A/B 테스트','퍼널 분석','마케팅 자동화','SQL'],
  'Data Engineer': ['Spark/Airflow','SQL','Python','데이터 모델링','클라우드 DW'],
  'Analytics Engineer': ['dbt','SQL','데이터 모델링','BI 도구','Python'],
  'Database Administrator': ['PostgreSQL/MySQL','성능 튜닝','백업/복구','고가용성','모니터링'],
  'Cloud Architect': ['AWS/GCP/Azure','인프라 설계','비용 최적화','보안','마이그레이션'],
  'Network Engineer': ['TCP/IP','라우팅/스위칭','SDN','방화벽','모니터링'],
  'Platform Engineer': ['Kubernetes','내부 개발 플랫폼','IaC','CI/CD','개발자 경험']
};

async function load(){
  const indexRes = await fetch('../../data/index.json');
  const indexData = await indexRes.json();
  const folderId = indexData.collections[0].folder_id;
  const jobsRes = await fetch(`../../data/${folderId}/jobs_trend.json`);
  const jobs = await jobsRes.json();
  const container = document.getElementById('roles-container');

  jobs.categories.forEach(cat=>{
    const color = catColors[cat.name]||'#6366F1';
    cat.roles.forEach(role=>{
      const sign = role.delta>0?'+':'';
      const paths = learningPaths[role.title]||['관련 기술 스택 학습','포트폴리오 구축','오픈소스 기여','기술 블로그 운영','모의 면접'];
      const section = document.createElement('div');
      section.className = 'role-detail';
      section.innerHTML = `
        <h2>${role.title} <span class="badge" style="background:${color}">${cat.name}</span></h2>
        <div class="demand-indicator">${role.demand} · 공고 ${role.count}건 (${sign}${role.delta})</div>
        <div class="detail-grid">
          <div class="detail-box">
            <h4>필수 스킬</h4>
            <div style="display:flex;flex-wrap:wrap;gap:.2rem">
              ${role.skills.map(s=>`<span class="tag" data-cat="Dev">${s}</span>`).join('')}
            </div>
          </div>
          <div class="detail-box">
            <h4>추천 학습 경로</h4>
            <ol style="padding-left:1.1rem;font-size:.82rem;color:var(--c-text2)">
              ${paths.map(p=>`<li style="margin-bottom:.15rem">${p}</li>`).join('')}
            </ol>
          </div>
        </div>
      `;
      container.appendChild(section);
    });
  });
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
